# ===================================
# DEV profile — Neon PostgreSQL
# Run with: mvn spring-boot:run -Dspring-boot.run.profiles=dev
#
# Same connection mechanism as prod: credentials come from environment
# variables, never hardcoded here. Point these at your own Neon branch/
# database for local development (not the production database) so dev
# work can never affect production data:
#   DB_URL       e.g. jdbc:postgresql://<host>/<db>?sslmode=require
#   DB_USERNAME
#   DB_PASSWORD
# ===================================

spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# HikariCP — small pool for local dev, generous timeouts for Neon cold-start
spring.datasource.hikari.pool-name=DevHikariPool
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=1
spring.datasource.hikari.connection-timeout=60000
spring.datasource.hikari.initialization-fail-timeout=120000
spring.datasource.hikari.idle-timeout=300000
