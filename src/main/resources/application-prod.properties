# ===================================
# PROD profile — Neon PostgreSQL
# Set env var on Koyeb: SPRING_PROFILES_ACTIVE=prod
# Or run locally: mvn spring-boot:run -Dspring-boot.run.profiles=prod
#
# SECURITY: credentials are read from environment variables and MUST NOT
# be hardcoded here. Set these on your hosting platform (Koyeb, etc.):
#   DB_URL       e.g. jdbc:postgresql://<host>/<db>?sslmode=require
#   DB_USERNAME
#   DB_PASSWORD
#   APP_REMEMBER_ME_KEY   a long random string, unique per environment
#   APP_ADMIN_PASSWORD    override the default admin password before first boot
#
# NOTE: this file previously contained a live Neon password committed to
# source control. That credential must be treated as compromised — rotate
# it in the Neon dashboard immediately, even after removing it here.
# ===================================

spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# HikariCP — generous timeouts for Neon cold-start
spring.datasource.hikari.pool-name=ProdHikariPool
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=1
spring.datasource.hikari.connection-timeout=60000
spring.datasource.hikari.initialization-fail-timeout=120000
spring.datasource.hikari.idle-timeout=300000

# Thymeleaf caching enabled in prod for performance (dev overrides this to false)
spring.thymeleaf.cache=true

# Secure cookies in production. Requires HTTPS to reach the app directly, or
# your reverse proxy/load balancer to forward the original scheme via
# X-Forwarded-Proto (Spring Boot honours server.forward-headers-strategy below).
server.servlet.session.cookie.secure=true
server.forward-headers-strategy=framework

# Demo content (see DataLoader) is disabled in production so a real client
# site never shows fake projects/testimonials/team members to visitors.
app.data.seed-demo-content=false

# Never let Hibernate auto-alter the live production schema (the common
# application.properties default is "update", fine for dev). This only
# validates that the schema matches the entities and fails fast on mismatch.
# IMPORTANT: there is no Flyway/Liquibase in this project yet, so any future
# entity change must be applied to the Neon database by hand (or by
# temporarily switching this back to "update" for one deploy) before the
# next release, or the app will fail to start.
spring.jpa.hibernate.ddl-auto=validate

# No insecure fallback in production: these have no default here, so Spring
# Boot fails fast at startup if APP_ADMIN_PASSWORD / APP_REMEMBER_ME_KEY are
# not set as environment variables. (The dev-only defaults in
# application.properties are for local convenience only.)
app.admin.password=${APP_ADMIN_PASSWORD}
app.security.remember-me-key=${APP_REMEMBER_ME_KEY}

# Don't leak stack traces / internals to clients in production
server.error.include-stacktrace=never
server.error.include-message=never
server.error.include-exception=false

