# =========================================================
# APPLICATION: KV Construction & Interior Management System
# Common settings — profile-specific DB config in
#   application-dev.properties  (Neon PostgreSQL, for local dev)
#   application-prod.properties (Neon PostgreSQL, for deploy)
# Both profiles connect to Postgres via DB_URL/DB_USERNAME/DB_PASSWORD
# environment variables — use separate Neon branches for dev vs prod.
# =========================================================

# Active profile: defaults to dev so a local run without an explicit profile
# never accidentally targets the production Neon database. Koyeb always sets
# SPRING_PROFILES_ACTIVE=prod explicitly (see Dockerfile), so this default
# only affects local/manual runs.
spring.profiles.active=dev
# ===================================
# Server
# ===================================
server.port=8080
server.servlet.encoding.charset=UTF-8
server.servlet.encoding.enabled=true
server.servlet.encoding.force=true

# ===================================
# JPA / Hibernate (common)
# ===================================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.jdbc.batch_size=20
spring.jpa.properties.hibernate.order_inserts=true

# ===================================
# Thymeleaf
# ===================================
spring.thymeleaf.cache=false
spring.thymeleaf.encoding=UTF-8
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html
spring.thymeleaf.mode=HTML

# ===================================
# File Upload (Multipart)
# ===================================
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=50MB

# ===================================
# File Storage (Custom Properties)
# ===================================
app.upload.dir=./uploads

# ===================================
# Cloudflare R2 (S3-compatible object storage for uploaded images)
# Required env vars: R2_ACCOUNT_ID, R2_ACCESS_KEY, R2_SECRET_KEY, R2_BUCKET, R2_PUBLIC_URL
# Used in both dev and prod (same bucket, same pattern as the shared Neon DB)
# so uploaded images survive redeploys/restarts instead of living on the
# container's ephemeral local disk.
# ===================================
app.r2.account-id=${R2_ACCOUNT_ID}
app.r2.access-key=${R2_ACCESS_KEY}
app.r2.secret-key=${R2_SECRET_KEY}
app.r2.bucket=${R2_BUCKET}
app.r2.public-url=${R2_PUBLIC_URL}

# ===================================
# Sentry (error monitoring)
# Optional: unset SENTRY_DSN means the SDK stays inactive (no-op), so this
# is safe to leave blank in dev.
# ===================================
sentry.dsn=${SENTRY_DSN:}
sentry.send-default-pii=true
sentry.environment=${SENTRY_ENVIRONMENT:dev}

# ===================================
# Resend (transactional email)
# Required for forgot-password + new-lead alerts. Unset RESEND_API_KEY means
# those features log a warning and no-op instead of failing hard.
# ===================================
app.email.resend-api-key=${RESEND_API_KEY:}
app.email.from-address=${EMAIL_FROM_ADDRESS:onboarding@resend.dev}
app.email.lead-alert-to=${LEAD_ALERT_EMAIL:}

# ===================================
# Spring Security / Session
# ===================================
server.servlet.session.timeout=30m
server.servlet.session.cookie.http-only=true
# Overridden to true in application-prod.properties (requires HTTPS).
server.servlet.session.cookie.secure=false

# Secret used to sign "remember me" tokens. ALWAYS override via the
# APP_REMEMBER_ME_KEY environment variable in any shared/production
# environment — the fallback below is fine for local dev only.
app.security.remember-me-key=${APP_REMEMBER_ME_KEY:dev-only-insecure-remember-me-key-change-me}

# ===================================
# Actuator (health checks for load balancers / uptime monitors)
# ===================================
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=when-authorized
management.endpoint.health.probes.enabled=true

# ===================================
# Logging
# ===================================
logging.level.com.construction=INFO
logging.level.org.springframework.security=WARN
logging.level.org.hibernate.SQL=WARN
logging.pattern.console=%d{HH:mm:ss} %-5level %logger{36} - %msg%n

# ===================================
# Application Custom Properties
# ===================================
app.name=KV Construction & Interior
app.tagline=Building Dreams, Delivering Excellence
app.email=info@buildmaster.com
app.phone=+1 (555) 123-4567
app.address=123 Construction Ave, Builder City, BC 12345

# Default Admin (seeded once, on first boot, if no admin with this email
# exists yet). ALWAYS override APP_ADMIN_PASSWORD via environment variable
# in production and log in to change it immediately after first deploy —
# the fallback below is a well-known default and must not be relied on.
app.admin.username=${APP_ADMIN_USERNAME:admin}
app.admin.email=${APP_ADMIN_EMAIL:nikilsp036@gmail.com}
app.admin.password=${APP_ADMIN_PASSWORD:Admin@123}
app.admin.full-name=${APP_ADMIN_FULL_NAME:System Administrator}

# Demo/sample content (services, projects, testimonials, team members) is
# seeded at most once per environment — see DataLoader for details. Deleting
# records afterwards will NOT bring them back on restart.
app.data.seed-demo-content=true
