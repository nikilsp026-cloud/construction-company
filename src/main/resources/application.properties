# =========================================================
# APPLICATION: KV Construction Management System
# Common settings — profile-specific DB config in
#   application-dev.properties  (H2, for local dev)
#   application-prod.properties (Neon PostgreSQL, for deploy)
# =========================================================

# Active profile: override with -Dspring.profiles.active=prod
# or set SPRING_PROFILES_ACTIVE=prod environment variable on Koyeb
spring.profiles.active=prod

# ===================================
# Server
# ===================================
server.port=8080
server.servlet.encoding.charset=UTF-8
server.servlet.encoding.enabled=true
server.servlet.encoding.force=true

# ===================================
# JPA / Hibernate (common)
# ===================================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.jdbc.batch_size=20
spring.jpa.properties.hibernate.order_inserts=true

# ===================================
# Thymeleaf
# ===================================
spring.thymeleaf.cache=false
spring.thymeleaf.encoding=UTF-8
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html
spring.thymeleaf.mode=HTML

# ===================================
# File Upload (Multipart)
# ===================================
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=50MB

# ===================================
# File Storage (Custom Properties)
# ===================================
app.upload.dir=./uploads

# ===================================
# Spring Security / Session
# ===================================
server.servlet.session.timeout=30m
server.servlet.session.cookie.http-only=true
server.servlet.session.cookie.secure=false

# ===================================
# Email (disabled — no mail server)
# ===================================
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.mail.MailSenderAutoConfiguration

# ===================================
# Logging
# ===================================
logging.level.com.construction=INFO
logging.level.org.springframework.security=WARN
logging.level.org.hibernate.SQL=WARN
logging.pattern.console=%d{HH:mm:ss} %-5level %logger{36} - %msg%n

# ===================================
# Application Custom Properties
# ===================================
app.name=KV Construction
app.tagline=Building Dreams, Delivering Excellence
app.email=info@buildmaster.com
app.phone=+1 (555) 123-4567
app.address=123 Construction Ave, Builder City, BC 12345

# Default Admin (seeded on first boot)
app.admin.username=admin
app.admin.email=admin@buildmaster.com
app.admin.password=Admin@123
app.admin.full-name=System Administrator
