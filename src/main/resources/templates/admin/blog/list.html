<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title th:text="${settings != null and settings['site_name'] != null ? settings['site_name'] + ' - Admin: Blog Posts' : 'Admin: Blog Posts'}">Admin: Blog Posts</title>

  <!-- Bootstrap 5.3 CDN -->
  <link rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
        crossorigin="anonymous" />

  <!-- Font Awesome 6 CDN -->
  <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"
        integrity="sha512-SnH5WK+bZxgPHs44uWIX+LLJAJ9/2PkPKZ5QiAj6Ta86w+fsb2TkcmfRyVX3pBnMFcV7oQPJkl9QevSCWr3W6A=="
        crossorigin="anonymous"
        referrerpolicy="no-referrer" />

    <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Outfit:wght@500;600;700;800&display=swap" rel="stylesheet">
  <!-- Shared design system -->
  <link rel="stylesheet" href="/css/main.css"/>
  <style>    body { background-color: #f5f2eb; }

    .admin-card {
      background: #fff;
      border: 1px solid #e2e8f0;
      border-radius: 8px;
    }
    .admin-card .card-header {
      background: transparent;
      border-bottom: 1px solid #e2e8f0;
      padding: 1rem 1.25rem;
    }
    .table th {
      font-size: 0.78rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: #64748b;
      border-top: none;
    }
    .btn-orange {
      background-color: var(--orange);
      border-color: var(--orange);
      color: #fff;
    }
    .btn-orange:hover {
      background-color: #e0431f;
      border-color: #e0431f;
      color: #fff;
    }
    .btn-action {
      padding: 0.25rem 0.55rem;
      font-size: 0.8rem;
    }
    .badge-status {
      font-size: 0.72rem;
      padding: 0.3em 0.65em;
      border-radius: 4px;
      font-weight: 600;
    }
    .admin-sidebar .nav-link:hover {
      background-color: rgba(200,155,60,0.18) !important;
      color: var(--orange) !important;
    }
  </style>
</head>
<body class="admin-body">

<div class="d-flex" style="min-height:100vh;">

  <!-- SIDEBAR -->
  <div th:replace="~{fragments/admin-sidebar :: adminSidebar}"></div>

  <!-- MAIN WRAPPER -->
  <div class="d-flex flex-column flex-grow-1 overflow-hidden">

    <!-- TOPBAR -->
    <div th:replace="~{fragments/admin-topbar :: adminTopbar('Blog Posts')}"></div>

    <!-- PAGE CONTENT -->
    <main class="flex-grow-1 p-4" style="overflow-y:auto;">

      <!-- Page heading -->
      <div class="d-flex align-items-center justify-content-between mb-4 flex-wrap gap-2">
        <div>
          <h4 class="fw-bold mb-0" style="color:var(--navy);">
            <i class="fas fa-newspaper me-2" style="color:var(--orange);"></i>Blog Posts
          </h4>
          <p class="text-muted small mb-0">Manage all blog posts and articles</p>
        </div>
        <a href="/admin/blog/new" class="btn btn-orange">
          <i class="fas fa-plus me-1"></i> Add New Post
        </a>
      </div>

      <!-- Flash messages -->
      <div th:if="${successMessage}"
           class="alert alert-success alert-dismissible fade show" role="alert">
        <i class="fas fa-circle-check me-2"></i>
        <span th:text="${successMessage}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
      </div>
      <div th:if="${errorMessage}"
           class="alert alert-danger alert-dismissible fade show" role="alert">
        <i class="fas fa-triangle-exclamation me-2"></i>
        <span th:text="${errorMessage}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
      </div>

      <!-- Blog posts table card -->
      <div class="admin-card">
        <div class="card-header d-flex align-items-center justify-content-between">
          <span class="fw-semibold text-secondary small">
            <span th:text="${posts != null} ? ${posts.totalElements} : '0'">0</span> post(s) total
          </span>
        </div>

        <div class="table-responsive">
          <table class="table table-hover align-middle mb-0">
            <thead class="table-light">
              <tr>
                <th style="width:32%;" class="ps-4">Title</th>
                <th>Slug</th>
                <th>Status</th>
                <th>Author</th>
                <th>Published</th>
                <th class="text-end pe-4">Actions</th>
              </tr>
            </thead>
            <tbody>

              <!-- Empty state -->
              <tr th:if="${posts == null or posts.isEmpty()}">
                <td colspan="6" class="text-center py-5 text-muted">
                  <i class="fas fa-file-alt fa-2x mb-2 d-block" style="color:#cbd5e1;"></i>
                  No blog posts found.
                  <a href="/admin/blog/new" style="color:var(--orange);">Write your first post.</a>
                </td>
              </tr>

              <!-- Post rows -->
              <tr th:each="post : ${posts}">
                <td class="ps-4">
                  <div class="fw-semibold text-truncate" style="max-width:260px; color:var(--navy);"
                       th:text="${post.title}">Post Title</div>
                  <div class="text-muted small text-truncate" style="max-width:260px;"
                       th:text="${post.shortDescription}">Short description…</div>
                </td>
                <td>
                  <code class="small text-muted"
                        th:text="${post.slug}">post-slug</code>
                </td>
                <td>
                  <span class="badge-status"
                        th:with="s=${post.status != null ? post.status.name() : 'DRAFT'}"
                        th:classappend="${s == 'PUBLISHED' ? 'bg-success text-white' : s == 'DRAFT' ? 'bg-secondary text-white' : s == 'ARCHIVED' ? 'bg-dark text-white' : 'bg-warning text-dark'}"
                        th:text="${post.status != null ? post.status.name() : 'DRAFT'}">
                    DRAFT
                  </span>
                </td>
                <td>
                  <span class="text-muted small"
                        th:text="${post.author != null ? post.author.fullName : '—'}">—</span>
                </td>
                <td>
                  <span class="text-muted small"
                        th:text="${post.publishedDate != null ? #temporals.format(post.publishedDate, 'dd MMM yyyy') : '—'}">—</span>
                </td>
                <td class="text-end pe-4">
                  <a th:href="@{/admin/blog/{id}/edit(id=${post.id})}"
                     class="btn btn-sm btn-outline-secondary btn-action me-1"
                     title="Edit">
                    <i class="fas fa-pen-to-square"></i>
                  </a>
                  <form th:action="@{/admin/blog/{id}/delete(id=${post.id})}"
                        method="post"
                        class="d-inline"
                        onsubmit="return confirm('Delete this post? This cannot be undone.');">
                    <input type="hidden" name="_method" value="DELETE" />
                    <button type="submit"
                            class="btn btn-sm btn-outline-danger btn-action"
                            title="Delete">
                      <i class="fas fa-trash"></i>
                    </button>
                  </form>
                </td>
              </tr>

            </tbody>
          </table>
        </div><!-- /table-responsive -->

        <!-- Pagination -->
        <div class="card-footer bg-transparent border-top d-flex align-items-center
                    justify-content-between flex-wrap gap-2 py-2 px-3"
             th:if="${posts != null and posts.totalPages > 1}">
          <small class="text-muted">
            Page <span th:text="${posts.number + 1}">1</span> of
            <span th:text="${posts.totalPages}">1</span>
          </small>
          <nav aria-label="Blog posts pagination">
            <ul class="pagination pagination-sm mb-0">
              <li class="page-item" th:classappend="${posts.first} ? 'disabled' : ''">
                <a class="page-link"
                   th:href="@{/admin/blog(page=${posts.number - 1})}"
                   aria-label="Previous">
                  <i class="fas fa-chevron-left"></i>
                </a>
              </li>
              <li class="page-item"
                  th:each="i : ${#numbers.sequence(0, posts.totalPages - 1)}"
                  th:classappend="${i == posts.number} ? 'active' : ''">
                <a class="page-link"
                   th:href="@{/admin/blog(page=${i})}"
                   th:text="${i + 1}">1</a>
              </li>
              <li class="page-item" th:classappend="${posts.last} ? 'disabled' : ''">
                <a class="page-link"
                   th:href="@{/admin/blog(page=${posts.number + 1})}"
                   aria-label="Next">
                  <i class="fas fa-chevron-right"></i>
                </a>
              </li>
            </ul>
          </nav>
        </div><!-- /pagination -->

      </div><!-- /admin-card -->

    </main>
  </div>
</div>

<!-- Bootstrap 5.3 JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
        crossorigin="anonymous"></script>
  <script src="/js/main.js"></script>
</body>
</html>
