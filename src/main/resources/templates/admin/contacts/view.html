<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title th:text="${settings != null and settings['site_name'] != null} ? ${settings['site_name']} + ' - Admin: View Message' : 'Admin: View Message'">Admin: View Message</title>

  <!-- Bootstrap 5.3 CDN -->
  <link rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
        crossorigin="anonymous" />

  <!-- Font Awesome 6 CDN -->
  <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"
        integrity="sha512-SnH5WK+bZxgPHs44uWIX+LLJAJ9/2PkPKZ5QiAj6Ta86w+fsb2TkcmfRyVX3pBnMFcV7oQPJkl9QevSCWr3W6A=="
        crossorigin="anonymous"
        referrerpolicy="no-referrer" />

    <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Outfit:wght@500;600;700;800&display=swap" rel="stylesheet">
  <!-- Shared design system -->
  <link rel="stylesheet" href="/css/main.css"/>
  <style>
    body { background-color: #f5f2eb; }

    .admin-sidebar .nav-link:hover,
    .admin-sidebar .nav-link.active {
      background-color: rgba(200,155,60,0.18) !important;
      color: var(--orange) !important;
    }

    .admin-card {
      background: #fff;
      border: 1px solid #e2e8f0;
      border-radius: 8px;
    }

    .detail-label {
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: #64748b;
      font-weight: 600;
      margin-bottom: 0.25rem;
    }

    .detail-value {
      color: var(--navy);
      font-size: 0.95rem;
    }

    .message-body {
      background-color: #f8f9fa;
      border: 1px solid #e2e8f0;
      border-radius: 6px;
      padding: 1.25rem;
      white-space: pre-wrap;
      word-break: break-word;
      line-height: 1.7;
      color: #334155;
      font-size: 0.95rem;
    }

    .btn-orange {
      background-color: var(--orange);
      border-color: var(--orange);
      color: #fff;
    }
    .btn-orange:hover {
      background-color: #e0431f;
      border-color: #e0431f;
      color: #fff;
    }
  </style>
</head>
<body class="admin-body">

<div class="d-flex" style="min-height:100vh;">

  <!-- ========== SIDEBAR ========== -->
  <div class="admin-sidebar" th:replace="~{fragments/admin-sidebar :: adminSidebar}"></div>

  <!-- ========== MAIN WRAPPER ========== -->
  <div class="d-flex flex-column flex-grow-1 overflow-hidden">

    <!-- TOP BAR -->
    <div th:replace="~{fragments/admin-topbar :: adminTopbar('View Message')}"></div>

    <!-- ========== PAGE CONTENT ========== -->
    <main class="flex-grow-1 p-4" style="overflow-y:auto;">

      <!-- Page heading + actions -->
      <div class="d-flex align-items-center justify-content-between mb-4 flex-wrap gap-2">
        <div>
          <h4 class="fw-bold mb-0" style="color: var(--navy);">
            <i class="fa-solid fa-envelope-open-text me-2" style="color: var(--orange);"></i>Message Detail
          </h4>
          <p class="text-muted small mb-0">Full contact form submission</p>
        </div>
        <div class="d-flex gap-2 flex-wrap">
          <!-- Back to list -->
          <a href="/admin/contacts" class="btn btn-outline-secondary">
            <i class="fa-solid fa-arrow-left me-1"></i>Back to List
          </a>
          <!-- Delete -->
          <form th:action="@{/admin/contacts/{id}/delete(id=${message.id})}"
                method="post"
                class="d-inline"
                onsubmit="return confirm('Delete this message? This action cannot be undone.');">
            <button type="submit" class="btn btn-outline-danger">
              <i class="fa-solid fa-trash me-1"></i>Delete
            </button>
          </form>
        </div>
      </div>

      <!-- Message detail card -->
      <div class="admin-card p-0">

        <!-- Card header: subject + read status -->
        <div class="d-flex align-items-center justify-content-between px-4 py-3 border-bottom">
          <h5 class="mb-0 fw-semibold" style="color: var(--navy);"
              th:text="${message.subject != null} ? ${message.subject} : '(no subject)'">
            Message Subject
          </h5>
          <span th:if="${message.read == null or !message.read}"
                class="badge rounded-pill"
                style="background:#dc3545; font-size:0.78rem; padding:0.35em 0.75em;">
            <i class="fa-solid fa-circle me-1" style="font-size:0.55rem;"></i>Unread
          </span>
          <span th:if="${message.read != null and message.read}"
                class="badge rounded-pill bg-secondary"
                style="font-size:0.78rem; padding:0.35em 0.75em;">
            <i class="fa-solid fa-check me-1"></i>Read
          </span>
        </div>

        <!-- Sender info grid -->
        <div class="row g-0 border-bottom">

          <div class="col-12 col-md-3 px-4 py-3 border-end">
            <div class="detail-label">Full Name</div>
            <div class="detail-value fw-semibold" th:text="${message.name}">John Doe</div>
          </div>

          <div class="col-12 col-md-3 px-4 py-3 border-end">
            <div class="detail-label">Email Address</div>
            <div class="detail-value">
              <a th:href="${'mailto:' + message.email}"
                 th:text="${message.email}"
                 class="text-decoration-none"
                 style="color:#0d6efd;">
                john@example.com
              </a>
            </div>
          </div>

          <div class="col-12 col-md-3 px-4 py-3 border-end">
            <div class="detail-label">Phone</div>
            <div class="detail-value"
                 th:text="${message.phone != null and message.phone != ''} ? ${message.phone} : '—'">
              +1 (555) 000-0000
            </div>
          </div>

          <div class="col-12 col-md-3 px-4 py-3">
            <div class="detail-label">Received</div>
            <div class="detail-value"
                 th:text="${message.createdAt != null} ? ${#temporals.format(message.createdAt, 'dd MMM yyyy, HH:mm')} : '—'">
              01 Jan 2025, 10:30
            </div>
          </div>

        </div><!-- /sender info row -->

        <!-- Message body -->
        <div class="px-4 py-4">
          <div class="detail-label mb-2">Message</div>
          <div class="message-body" th:text="${message.message}">
            The full message text appears here.
          </div>
        </div>

      </div><!-- /admin-card -->

      <!-- Bottom action row -->
      <div class="d-flex gap-2 mt-3 flex-wrap">
        <a href="/admin/contacts" class="btn btn-outline-secondary">
          <i class="fa-solid fa-arrow-left me-1"></i>Back to List
        </a>
        <a th:href="${'mailto:' + message.email}" class="btn btn-orange">
          <i class="fa-solid fa-reply me-1"></i>Reply by Email
        </a>
        <form th:action="@{/admin/contacts/{id}/delete(id=${message.id})}"
              method="post"
              class="d-inline"
              onsubmit="return confirm('Delete this message? This action cannot be undone.');">
          <button type="submit" class="btn btn-outline-danger">
            <i class="fa-solid fa-trash me-1"></i>Delete Message
          </button>
        </form>
      </div>

    </main><!-- /main -->

  </div><!-- /main wrapper -->

</div><!-- /d-flex root -->

<!-- Bootstrap 5.3 JS bundle -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
        crossorigin="anonymous"></script>

  <script src="/js/main.js"></script>
</body>
</html>
