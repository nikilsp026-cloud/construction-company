<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title th:text="${settings != null and settings['site_name'] != null ? settings['site_name'] + ' - Admin: ' + (item != null and item.id != null ? 'Edit Image' : 'Add Image') : 'Admin: Gallery Image'}">Admin: Gallery Image</title>

  <!-- Bootstrap 5.3 CDN -->
  <link rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
        crossorigin="anonymous" />

  <!-- Font Awesome 6 CDN -->
  <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"
        integrity="sha512-SnH5WK+bZxgPHs44uWIX+LLJAJ9/2PkPKZ5QiAj6Ta86w+fsb2TkcmfRyVX3pBnMFcV7oQPJkl9QevSCWr3W6A=="
        crossorigin="anonymous"
        referrerpolicy="no-referrer" />

    <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Poppins:wght@600;700;800&display=swap" rel="stylesheet">
  <!-- Shared design system -->
  <link rel="stylesheet" href="/css/main.css"/>
  <style>
    :root {
      --navy:  var(--navy);
      --orange: var(--orange);
    }
    body { background-color: #f0f2f5; }

    .admin-card {
      background: #fff;
      border: 1px solid #e2e8f0;
      border-radius: 8px;
    }
    .admin-card .card-header {
      background: transparent;
      border-bottom: 1px solid #e2e8f0;
      padding: 1rem 1.25rem;
    }
    .btn-orange {
      background-color: var(--orange);
      border-color: var(--orange);
      color: #fff;
    }
    .btn-orange:hover {
      background-color: #e0831a;
      border-color: #e0831a;
      color: #fff;
    }
    .form-label {
      font-weight: 600;
      font-size: 0.85rem;
      color: #374151;
    }
    .form-text { font-size: 0.78rem; }
    .upload-zone {
      border: 2px dashed #d1d5db;
      border-radius: 8px;
      padding: 2rem;
      text-align: center;
      cursor: pointer;
      transition: border-color 0.2s;
      background: #f9fafb;
    }
    .upload-zone:hover { border-color: var(--orange); }
    .upload-zone .upload-icon { font-size: 2.5rem; color: #9ca3af; margin-bottom: 0.5rem; }
    .admin-sidebar .nav-link:hover {
      background-color: rgba(247, 148, 29, 0.18) !important;
      color: var(--orange) !important;
    }
  </style>
</head>
<body class="admin-body">

<div class="d-flex" style="min-height:100vh;">

  <!-- SIDEBAR -->
  <div th:replace="~{fragments/admin-sidebar :: adminSidebar}"></div>

  <!-- MAIN WRAPPER -->
  <div class="d-flex flex-column flex-grow-1 overflow-hidden">

    <!-- TOPBAR -->
    <div th:replace="~{fragments/admin-topbar :: adminTopbar(${item != null and item.id != null} ? 'Edit Gallery Image' : 'Add Gallery Image')}"></div>

    <!-- PAGE CONTENT -->
    <main class="flex-grow-1 p-4" style="overflow-y:auto;">

      <!-- Page heading -->
      <div class="d-flex align-items-center justify-content-between mb-4 flex-wrap gap-2">
        <div>
          <h4 class="fw-bold mb-0" style="color:var(--navy);">
            <i class="fas fa-images me-2" style="color:var(--orange);"></i>
            <span th:text="${item != null and item.id != null} ? 'Edit Gallery Image' : 'Add Gallery Image'">Gallery Image</span>
          </h4>
          <p class="text-muted small mb-0">
            <span th:text="${item != null and item.id != null}
                           ? 'Update the image details below'
                           : 'Upload a new image to the gallery'">Upload a new image</span>
          </p>
        </div>
        <a href="/admin/gallery" class="btn btn-outline-secondary btn-sm">
          <i class="fas fa-arrow-left me-1"></i> Back to Gallery
        </a>
      </div>

      <!-- Flash messages -->
      <div th:if="${errorMessage}"
           class="alert alert-danger alert-dismissible fade show mb-4" role="alert">
        <i class="fas fa-triangle-exclamation me-2"></i>
        <span th:text="${errorMessage}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
      </div>

      <!-- Form -->
      <form th:action="@{/admin/gallery/save}"
            th:object="${item}"
            method="post"
            enctype="multipart/form-data"
            novalidate>

        <input type="hidden" th:field="*{id}" />

        <div class="row g-4 justify-content-center">
          <div class="col-lg-7">

            <!-- Image upload card -->
            <div class="admin-card mb-4">
              <div class="card-header">
                <span class="fw-semibold" style="color:var(--navy);">Image File</span>
              </div>
              <div class="card-body p-4">

                <!-- Current image preview (edit mode) -->
                <div th:if="${item != null and item.imageUrl != null}" class="mb-4">
                  <p class="form-label mb-2">Current Image</p>
                  <div class="text-center">
                    <img th:src="@{${item.imageUrl}}"
                         alt="Current gallery image"
                         class="img-fluid rounded"
                         style="max-height:220px; object-fit:cover; border:1px solid #e2e8f0;" />
                  </div>
                </div>

                <!-- File upload zone -->
                <div class="upload-zone"
                     onclick="document.getElementById('imageFile').click()">
                  <div class="upload-icon">
                    <i class="fas fa-cloud-upload-alt"></i>
                  </div>
                  <p class="mb-1 fw-semibold" style="color:var(--navy);">
                    <span th:text="${item != null and item.imageUrl != null}
                                   ? 'Click to replace image'
                                   : 'Click to upload image'">Click to upload</span>
                  </p>
                  <p class="text-muted small mb-0">JPG, PNG, WebP — max 10 MB</p>
                </div>
                <input type="file"
                       id="imageFile"
                       name="imageFile"
                       accept="image/*"
                       class="d-none"
                       th:required="${item == null or item.id == null}"
                       onchange="previewImage(this)" />
                <div id="imagePreviewWrap" class="mt-3 text-center d-none">
                  <img id="imagePreview" src="#" alt="Preview"
                       class="img-fluid rounded"
                       style="max-height:200px; object-fit:cover; border:1px solid #e2e8f0;" />
                  <div class="form-text mt-1" id="imageFileName"></div>
                </div>

              </div>
            </div>

            <!-- Details card -->
            <div class="admin-card mb-4">
              <div class="card-header">
                <span class="fw-semibold" style="color:var(--navy);">Image Details</span>
              </div>
              <div class="card-body p-4">

                <!-- Title -->
                <div class="mb-3">
                  <label for="title" class="form-label">Title</label>
                  <input type="text"
                         id="title"
                         th:field="*{title}"
                         class="form-control"
                         placeholder="e.g. Downtown Office Renovation" />
                </div>

                <!-- Category -->
                <div class="mb-3">
                  <label for="category" class="form-label">Category</label>
                  <input type="text"
                         id="category"
                         th:field="*{category}"
                         class="form-control"
                         placeholder="e.g. Commercial, Residential, Industrial" />
                  <div class="form-text">Used to filter images on the gallery page.</div>
                </div>

                <!-- Description -->
                <div class="mb-0">
                  <label for="description" class="form-label">Description</label>
                  <textarea id="description"
                            th:field="*{description}"
                            class="form-control"
                            rows="3"
                            placeholder="Optional description or caption for this image…"></textarea>
                </div>

              </div>
            </div>

            <!-- Action buttons -->
            <div class="d-flex gap-2">
              <button type="submit" class="btn btn-orange">
                <i class="fas fa-save me-1"></i>
                <span th:text="${item != null and item.id != null} ? 'Update Image' : 'Save Image'">Save Image</span>
              </button>
              <a href="/admin/gallery" class="btn btn-outline-secondary">
                <i class="fas fa-times me-1"></i> Cancel
              </a>
            </div>

          </div>
        </div><!-- /row -->

      </form>

    </main>
  </div>
</div>

<!-- Bootstrap 5.3 JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
        crossorigin="anonymous"></script>

<script>
  function previewImage(input) {
    const wrap    = document.getElementById('imagePreviewWrap');
    const preview = document.getElementById('imagePreview');
    const label   = document.getElementById('imageFileName');

    if (input.files && input.files[0]) {
      const file = input.files[0];
      const reader = new FileReader();
      reader.onload = function (e) {
        preview.src = e.target.result;
        label.textContent = file.name + ' (' + (file.size / 1024).toFixed(1) + ' KB)';
        wrap.classList.remove('d-none');
      };
      reader.readAsDataURL(file);
    } else {
      wrap.classList.add('d-none');
    }
  }
</script>
  <script src="/js/main.js"></script>
</body>
</html>
