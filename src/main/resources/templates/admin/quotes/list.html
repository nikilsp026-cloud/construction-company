<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title th:text="${settings != null and settings['site_name'] != null} ? ${settings['site_name']} + ' - Admin: Quote Requests' : 'Admin: Quote Requests'">Admin: Quote Requests</title>

  <!-- Bootstrap 5.3 CDN -->
  <link rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
        crossorigin="anonymous" />

  <!-- Font Awesome 6 CDN -->
  <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"
        integrity="sha512-SnH5WK+bZxgPHs44uWIX+LLJAJ9/2PkPKZ5QiAj6Ta86w+fsb2TkcmfRyVX3pBnMFcV7oQPJkl9QevSCWr3W6A=="
        crossorigin="anonymous"
        referrerpolicy="no-referrer" />

    <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Outfit:wght@500;600;700;800&display=swap" rel="stylesheet">
  <!-- Shared design system -->
  <link rel="stylesheet" href="/css/main.css"/>
  <style>
    body { background-color: #f5f2eb; }

    .admin-sidebar .nav-link:hover,
    .admin-sidebar .nav-link.active {
      background-color: rgba(200,155,60,0.18) !important;
      color: var(--orange) !important;
    }

    .admin-card {
      background: #fff;
      border: 1px solid #e2e8f0;
      border-radius: 8px;
    }

    .table th {
      font-size: 0.78rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: #64748b;
      font-weight: 600;
    }

    .table td { vertical-align: middle; }

    .btn-orange {
      background-color: var(--orange);
      border-color: var(--orange);
      color: #fff;
    }
    .btn-orange:hover {
      background-color: #e0431f;
      border-color: #e0431f;
      color: #fff;
    }

    .btn-action {
      padding: 0.25rem 0.55rem;
      font-size: 0.8rem;
    }

    /* Status badge colour helpers */
    .status-new        { background-color: #dc3545; color:#fff; }
    .status-reviewed   { background-color: #0d6efd; color:#fff; }
    .status-contacted  { background-color: #6f42c1; color:#fff; }
    .status-accepted   { background-color: #198754; color:#fff; }
    .status-rejected   { background-color: #6c757d; color:#fff; }
    .status-pending    { background-color: #fd7e14; color:#fff; }
    .status-default    { background-color: #adb5bd; color:#fff; }
  </style>
</head>
<body class="admin-body">

<div class="d-flex" style="min-height:100vh;">

  <!-- ========== SIDEBAR ========== -->
  <div class="admin-sidebar" th:replace="~{fragments/admin-sidebar :: adminSidebar}"></div>

  <!-- ========== MAIN WRAPPER ========== -->
  <div class="d-flex flex-column flex-grow-1 overflow-hidden">

    <!-- TOP BAR -->
    <div th:replace="~{fragments/admin-topbar :: adminTopbar('Quote Requests')}"></div>

    <!-- ========== PAGE CONTENT ========== -->
    <main class="flex-grow-1 p-4" style="overflow-y:auto;">

      <!-- Page heading -->
      <div class="d-flex align-items-center justify-content-between mb-4 flex-wrap gap-2">
        <div>
          <h4 class="fw-bold mb-0" style="color: var(--navy);">
            <i class="fa-solid fa-file-invoice-dollar me-2" style="color: var(--orange);"></i>Quote Requests
          </h4>
          <p class="text-muted small mb-0">Manage and respond to customer quote submissions</p>
        </div>
        <small class="text-muted" th:if="${quotes != null}">
          <span th:text="${quotes.totalElements}">0</span> request(s) total
        </small>
      </div>

      <!-- Flash messages -->
      <div th:if="${successMessage}" class="alert alert-success alert-dismissible fade show" role="alert">
        <i class="fa-solid fa-circle-check me-2"></i>
        <span th:text="${successMessage}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
      </div>
      <div th:if="${errorMessage}" class="alert alert-danger alert-dismissible fade show" role="alert">
        <i class="fa-solid fa-triangle-exclamation me-2"></i>
        <span th:text="${errorMessage}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
      </div>

      <!-- Status filter -->
      <div class="d-flex align-items-center gap-3 mb-3 flex-wrap">
        <form method="get" action="/admin/quotes" class="d-flex align-items-center gap-2">
          <label for="statusFilter" class="form-label mb-0 small fw-semibold text-muted">
            Filter by status:
          </label>
          <select id="statusFilter"
                  name="status"
                  class="form-select form-select-sm"
                  style="width:auto; min-width:160px;"
                  onchange="this.form.submit()">
            <option value="" th:selected="${currentStatus == null or currentStatus == ''}">All Statuses</option>
            <option th:each="s : ${statuses}"
                    th:value="${s.name()}"
                    th:text="${s.name()}"
                    th:selected="${currentStatus != null and currentStatus == s.name()}">
              STATUS
            </option>
          </select>
          <button type="submit" class="btn btn-sm btn-outline-secondary">
            <i class="fa-solid fa-filter me-1"></i>Filter
          </button>
          <a href="/admin/quotes" class="btn btn-sm btn-outline-secondary" title="Clear filter">
            <i class="fa-solid fa-xmark"></i>
          </a>
        </form>
      </div>

      <!-- Quotes table card -->
      <div class="admin-card">
        <div class="table-responsive">
          <table class="table table-hover align-middle mb-0">
            <thead class="table-light">
              <tr>
                <th style="width:18%;">Name</th>
                <th style="width:20%;">Email</th>
                <th style="width:18%;">Construction Type</th>
                <th style="width:12%;">Budget</th>
                <th style="width:12%;" class="text-center">Status</th>
                <th style="width:13%;">Submitted</th>
                <th style="width:7%;" class="text-end pe-3">Action</th>
              </tr>
            </thead>
            <tbody>

              <!-- Empty state -->
              <tr th:if="${quotes == null or quotes.isEmpty()}">
                <td colspan="7" class="text-center py-5 text-muted">
                  <i class="fa-solid fa-file-circle-xmark fa-2x mb-2 d-block" style="color: #cbd5e1;"></i>
                  No quote requests found.
                </td>
              </tr>

              <!-- Quote rows -->
              <tr th:each="quote : ${quotes}">

                <!-- Name -->
                <td>
                  <div class="fw-semibold" style="color:var(--navy);" th:text="${quote.name}">Jane Smith</div>
                </td>

                <!-- Email -->
                <td>
                  <a th:href="${'mailto:' + quote.email}"
                     class="text-decoration-none small"
                     style="color:#0d6efd;"
                     th:text="${quote.email}">
                    jane@example.com
                  </a>
                </td>

                <!-- Construction Type -->
                <td>
                  <span class="text-muted small"
                        th:text="${quote.constructionType != null} ? ${quote.constructionType} : '—'">
                    Residential
                  </span>
                </td>

                <!-- Budget -->
                <td>
                  <span class="small fw-semibold"
                        th:text="${T(com.construction.util.CurrencyUtil).formatBudgetRange(quote.budget)}">
                    ₹10,00,000
                  </span>
                </td>

                <!-- Status badge -->
                <td class="text-center">
                  <span class="badge rounded-pill"
                        style="font-size:0.72rem; padding:0.3em 0.75em;"
                        th:with="st=${quote.status != null ? quote.status.name().toLowerCase() : 'default'}"
                        th:classappend="${st == 'new'}        ? 'status-new'
                                      : (${st == 'reviewed'}  ? 'status-reviewed'
                                      : (${st == 'contacted'} ? 'status-contacted'
                                      : (${st == 'accepted'}  ? 'status-accepted'
                                      : (${st == 'rejected'}  ? 'status-rejected'
                                      : (${st == 'pending'}   ? 'status-pending'
                                      : 'status-default')))))"
                        th:text="${quote.status != null} ? ${quote.status.name()} : '—'">
                    NEW
                  </span>
                </td>

                <!-- Created At -->
                <td>
                  <span class="text-muted small"
                        th:text="${quote.createdAt != null} ? ${#temporals.format(quote.createdAt, 'dd MMM yyyy')} : '—'">
                    01 Jan 2025
                  </span>
                </td>

                <!-- View link -->
                <td class="text-end pe-3">
                  <a th:href="@{/admin/quotes/{id}(id=${quote.id})}"
                     class="btn btn-sm btn-outline-primary btn-action"
                     title="View quote">
                    <i class="fa-solid fa-eye"></i>
                  </a>
                </td>

              </tr>
            </tbody>
          </table>
        </div><!-- /table-responsive -->

        <!-- Pagination -->
        <div class="card-footer bg-transparent border-top d-flex align-items-center justify-content-between flex-wrap gap-2 py-2 px-3"
             th:if="${quotes != null and quotes.totalPages > 1}">
          <small class="text-muted">
            Page <span th:text="${quotes.number + 1}">1</span> of
            <span th:text="${quotes.totalPages}">1</span>
          </small>
          <nav aria-label="Quotes pagination">
            <ul class="pagination pagination-sm mb-0">

              <!-- Previous -->
              <li class="page-item" th:classappend="${quotes.first} ? 'disabled' : ''">
                <a class="page-link"
                   th:href="@{/admin/quotes(page=${quotes.number - 1}, status=${currentStatus})}"
                   aria-label="Previous">
                  <i class="fa-solid fa-chevron-left"></i>
                </a>
              </li>

              <!-- Page numbers -->
              <li class="page-item"
                  th:each="i : ${#numbers.sequence(0, quotes.totalPages - 1)}"
                  th:classappend="${i == quotes.number} ? 'active' : ''">
                <a class="page-link"
                   th:href="@{/admin/quotes(page=${i}, status=${currentStatus})}"
                   th:text="${i + 1}">1</a>
              </li>

              <!-- Next -->
              <li class="page-item" th:classappend="${quotes.last} ? 'disabled' : ''">
                <a class="page-link"
                   th:href="@{/admin/quotes(page=${quotes.number + 1}, status=${currentStatus})}"
                   aria-label="Next">
                  <i class="fa-solid fa-chevron-right"></i>
                </a>
              </li>

            </ul>
          </nav>
        </div><!-- /pagination -->

      </div><!-- /admin-card -->

    </main><!-- /main -->

  </div><!-- /main wrapper -->

</div><!-- /d-flex root -->

<!-- Bootstrap 5.3 JS bundle -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
        crossorigin="anonymous"></script>

  <script src="/js/main.js"></script>
</body>
</html>
