<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Quote Details - Admin</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"/>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
    <style>
        body { background:#f4f6f9; }
        .sidebar { width:250px; min-height:100vh; background:#1a2332; position:fixed; top:0; left:0; z-index:100; }
        .sidebar .brand { padding:20px; color:#f7941d; font-weight:700; font-size:1.1rem; border-bottom:1px solid #2d3e55; }
        .sidebar .nav-link { color:#adb5bd; padding:10px 20px; display:block; text-decoration:none; transition:all .2s; }
        .sidebar .nav-link:hover, .sidebar .nav-link.active { color:#f7941d; background:rgba(247,148,29,.1); }
        .sidebar .nav-link i { width:20px; margin-right:8px; }
        .main-content { margin-left:250px; padding:0; }
        .topbar { background:#fff; padding:15px 25px; border-bottom:1px solid #dee2e6; display:flex; align-items:center; justify-content:space-between; }
        .status-badge-PENDING { background:#ffc107; color:#000; }
        .status-badge-REVIEWED { background:#17a2b8; color:#fff; }
        .status-badge-APPROVED { background:#28a745; color:#fff; }
        .status-badge-REJECTED { background:#dc3545; color:#fff; }
    </style>
</head>
<body>
<div th:replace="~{fragments/admin-sidebar :: adminSidebar}"></div>
<div class="main-content">
    <div th:replace="~{fragments/admin-topbar :: adminTopbar('Quote Details')}"></div>
    <div class="container-fluid p-4">
        <div th:if="${successMessage}" class="alert alert-success alert-dismissible fade show" role="alert">
            <span th:text="${successMessage}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>
        <div class="row mb-3">
            <div class="col">
                <a href="/admin/quotes" class="btn btn-secondary btn-sm"><i class="fas fa-arrow-left me-1"></i>Back to Quotes</a>
            </div>
        </div>
        <div class="row">
            <div class="col-md-8">
                <div class="card shadow-sm mb-4">
                    <div class="card-header d-flex justify-content-between align-items-center">
                        <h5 class="mb-0">Quote Request Details</h5>
                        <span class="badge px-3 py-2" th:classappend="'status-badge-' + ${quote.status}" th:text="${quote.status}"></span>
                    </div>
                    <div class="card-body">
                        <div class="row g-3">
                            <div class="col-md-6">
                                <label class="text-muted small">Name</label>
                                <p class="fw-semibold mb-0" th:text="${quote.name}"></p>
                            </div>
                            <div class="col-md-6">
                                <label class="text-muted small">Email</label>
                                <p class="mb-0" th:text="${quote.email ?: '-'}"></p>
                            </div>
                            <div class="col-md-6">
                                <label class="text-muted small">Phone</label>
                                <p class="mb-0" th:text="${quote.phone ?: '-'}"></p>
                            </div>
                            <div class="col-md-6">
                                <label class="text-muted small">Location</label>
                                <p class="mb-0" th:text="${quote.location ?: '-'}"></p>
                            </div>
                            <div class="col-md-6">
                                <label class="text-muted small">Construction Type</label>
                                <p class="mb-0" th:text="${quote.constructionType ?: '-'}"></p>
                            </div>
                            <div class="col-md-6">
                                <label class="text-muted small">Budget Range</label>
                                <p class="mb-0" th:text="${quote.budget ?: '-'}"></p>
                            </div>
                            <div class="col-md-6">
                                <label class="text-muted small">Area</label>
                                <p class="mb-0" th:text="${quote.area ?: '-'}"></p>
                            </div>
                            <div class="col-md-6">
                                <label class="text-muted small">Submitted</label>
                                <p class="mb-0" th:text="${#temporals.format(quote.createdAt, 'dd MMM yyyy HH:mm')}"></p>
                            </div>
                            <div class="col-12" th:if="${quote.message}">
                                <label class="text-muted small">Message</label>
                                <p class="mb-0" th:text="${quote.message}"></p>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
            <div class="col-md-4">
                <div class="card shadow-sm mb-3">
                    <div class="card-header"><h6 class="mb-0">Update Status</h6></div>
                    <div class="card-body">
                        <form th:action="@{/admin/quotes/{id}/status(id=${quote.id})}" method="post">
                            <div class="mb-3">
                                <select name="status" class="form-select">
                                    <option th:each="s : ${statuses}" th:value="${s}" th:text="${s}" th:selected="${s == quote.status}"></option>
                                </select>
                            </div>
                            <button type="submit" class="btn btn-primary w-100">Update Status</button>
                        </form>
                    </div>
                </div>
                <div class="card shadow-sm border-danger">
                    <div class="card-body">
                        <form th:action="@{/admin/quotes/{id}/delete(id=${quote.id})}" method="post"
                              onsubmit="return confirm('Delete this quote request?')">
                            <button type="submit" class="btn btn-danger w-100"><i class="fas fa-trash me-1"></i>Delete Quote</button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
