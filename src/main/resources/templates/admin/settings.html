<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Website Settings - Admin</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"/>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
    <style>
        body { background:#f4f6f9; }
        .sidebar { width:250px; min-height:100vh; background:#1a2332; position:fixed; top:0; left:0; z-index:100; }
        .sidebar .brand { padding:20px; color:#f7941d; font-weight:700; font-size:1.1rem; border-bottom:1px solid #2d3e55; }
        .sidebar .nav-link { color:#adb5bd; padding:10px 20px; display:block; text-decoration:none; transition:all .2s; }
        .sidebar .nav-link:hover, .sidebar .nav-link.active { color:#f7941d; background:rgba(247,148,29,.1); }
        .sidebar .nav-link i { width:20px; margin-right:8px; }
        .main-content { margin-left:250px; padding:0; }
        .topbar { background:#fff; padding:15px 25px; border-bottom:1px solid #dee2e6; display:flex; align-items:center; justify-content:space-between; }
    </style>
</head>
<body>
<div th:replace="~{fragments/admin-sidebar :: adminSidebar}"></div>
<div class="main-content">
    <div th:replace="~{fragments/admin-topbar :: adminTopbar('Website Settings')}"></div>
    <div class="container-fluid p-4">
        <div th:if="${successMessage}" class="alert alert-success alert-dismissible fade show" role="alert">
            <i class="fas fa-check-circle me-2"></i><span th:text="${successMessage}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>
        <div class="card shadow-sm">
            <div class="card-header">
                <h5 class="mb-0"><i class="fas fa-cog me-2"></i>Website Settings</h5>
            </div>
            <div class="card-body">
                <form action="/admin/settings/save" method="post">
                    <div class="row g-3">
                        <div class="col-12" th:each="s : ${allSettings}">
                            <div class="mb-2">
                                <label class="form-label fw-semibold" th:text="${s.settingKey.replace('_', ' ').toUpperCase()}"></label>
                                <textarea th:if="${s.settingType == 'textarea'}"
                                          class="form-control"
                                          th:name="${s.settingKey}"
                                          rows="3"
                                          th:text="${s.settingValue}"></textarea>
                                <input th:unless="${s.settingType == 'textarea'}"
                                       type="text"
                                       class="form-control"
                                       th:name="${s.settingKey}"
                                       th:value="${s.settingValue}"/>
                            </div>
                        </div>
                    </div>
                    <div class="mt-4">
                        <button type="submit" class="btn btn-warning fw-bold px-4">
                            <i class="fas fa-save me-2"></i>Save Settings
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
