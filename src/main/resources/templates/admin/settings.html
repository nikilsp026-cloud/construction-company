<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Website Settings - Admin</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"/>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
      <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Poppins:wght@600;700;800&display=swap" rel="stylesheet">
  <!-- Shared design system -->
  <link rel="stylesheet" href="/css/main.css"/>
  <style>
        body { background:#f4f6f9; }
    </style>
</head>
<body class="admin-body">
<div class="d-flex" style="min-height:100vh;">
  <div th:replace="~{fragments/admin-sidebar :: adminSidebar}"></div>
  <div class="d-flex flex-column flex-grow-1 overflow-hidden">
    <div th:replace="~{fragments/admin-topbar :: adminTopbar('Website Settings')}"></div>
    <main class="flex-grow-1 p-4" style="overflow-y:auto;">
        <div th:if="${successMessage}" class="alert alert-success alert-dismissible fade show" role="alert">
            <i class="fas fa-check-circle me-2"></i><span th:text="${successMessage}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>
        <div class="card shadow-sm">
            <div class="card-header">
                <h5 class="mb-0"><i class="fas fa-cog me-2"></i>Website Settings</h5>
            </div>
            <div class="card-body">
                <form th:action="@{/admin/settings/save}" method="post">
                    <div class="row g-3">
                        <div class="col-12" th:each="s : ${allSettings}">
                            <div class="mb-2">
                                <label class="form-label fw-semibold" th:text="${s.settingKey.replace('_', ' ').toUpperCase()}"></label>
                                <textarea th:if="${s.settingType == 'textarea'}"
                                          class="form-control"
                                          th:name="${s.settingKey}"
                                          rows="3"
                                          th:text="${s.settingValue}"></textarea>
                                <input th:unless="${s.settingType == 'textarea'}"
                                       type="text"
                                       class="form-control"
                                       th:name="${s.settingKey}"
                                       th:value="${s.settingValue}"/>
                            </div>
                        </div>
                    </div>
                    <div class="mt-4">
                        <button type="submit" class="btn btn-warning fw-bold px-4">
                            <i class="fas fa-save me-2"></i>Save Settings
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </main>
  </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script src="/js/main.js"></script>
</body>
</html>
