<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title th:text="${settings != null and settings['site_name'] != null ? settings['site_name'] + ' - Admin: ' + (member != null and member.id != null ? 'Edit Member' : 'Add Member') : 'Admin: Team Member'}">Admin: Team Member</title>

  <!-- Bootstrap 5.3 CDN -->
  <link rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
        crossorigin="anonymous" />

  <!-- Font Awesome 6 CDN -->
  <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"
        integrity="sha512-SnH5WK+bZxgPHs44uWIX+LLJAJ9/2PkPKZ5QiAj6Ta86w+fsb2TkcmfRyVX3pBnMFcV7oQPJkl9QevSCWr3W6A=="
        crossorigin="anonymous"
        referrerpolicy="no-referrer" />

    <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Plus+Jakarta+Sans:wght@600;700;800&display=swap" rel="stylesheet">
  <!-- Shared design system -->
  <link rel="stylesheet" href="/css/main.css"/>
  <style>
    :root {
      --navy:  var(--navy);
      --orange: var(--orange);
    }
    body { background-color: #f0f2f5; }

    .admin-card {
      background: #fff;
      border: 1px solid #e2e8f0;
      border-radius: 8px;
    }
    .admin-card .card-header {
      background: transparent;
      border-bottom: 1px solid #e2e8f0;
      padding: 1rem 1.25rem;
    }
    .btn-orange {
      background-color: var(--orange);
      border-color: var(--orange);
      color: #fff;
    }
    .btn-orange:hover {
      background-color: #e0431f;
      border-color: #e0431f;
      color: #fff;
    }
    .form-label {
      font-weight: 600;
      font-size: 0.85rem;
      color: #374151;
    }
    .form-text { font-size: 0.78rem; }
    .social-icon {
      width: 36px;
      text-align: center;
      color: #6c757d;
    }
    .photo-preview-wrap {
      width: 120px;
      height: 120px;
      border-radius: 50%;
      overflow: hidden;
      border: 3px solid #e2e8f0;
      margin: 0 auto 1rem;
      background: #f1f5f9;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      position: relative;
    }
    .photo-preview-wrap img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    .photo-overlay {
      position: absolute;
      inset: 0;
      background: rgba(0,0,0,0.45);
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      transition: opacity 0.2s;
      border-radius: 50%;
      color: #fff;
      font-size: 1.2rem;
    }
    .photo-preview-wrap:hover .photo-overlay { opacity: 1; }
    .admin-sidebar .nav-link:hover {
      background-color: rgba(255,90,54, 0.18) !important;
      color: var(--orange) !important;
    }
  </style>
</head>
<body class="admin-body">

<div class="d-flex" style="min-height:100vh;">

  <!-- SIDEBAR -->
  <div th:replace="~{fragments/admin-sidebar :: adminSidebar}"></div>

  <!-- MAIN WRAPPER -->
  <div class="d-flex flex-column flex-grow-1 overflow-hidden">

    <!-- TOPBAR -->
    <div th:replace="~{fragments/admin-topbar :: adminTopbar(${member != null and member.id != null} ? 'Edit Team Member' : 'Add Team Member')}"></div>

    <!-- PAGE CONTENT -->
    <main class="flex-grow-1 p-4" style="overflow-y:auto;">

      <!-- Page heading -->
      <div class="d-flex align-items-center justify-content-between mb-4 flex-wrap gap-2">
        <div>
          <h4 class="fw-bold mb-0" style="color:var(--navy);">
            <i class="fas fa-user-plus me-2" style="color:var(--orange);"></i>
            <span th:text="${member != null and member.id != null} ? 'Edit Team Member' : 'Add Team Member'">Team Member</span>
          </h4>
          <p class="text-muted small mb-0">
            <span th:text="${member != null and member.id != null}
                           ? 'Update the member profile below'
                           : 'Fill in the details to add a new team member'">Fill in the details</span>
          </p>
        </div>
        <a href="/admin/team" class="btn btn-outline-secondary btn-sm">
          <i class="fas fa-arrow-left me-1"></i> Back to Team
        </a>
      </div>

      <!-- Flash messages -->
      <div th:if="${errorMessage}"
           class="alert alert-danger alert-dismissible fade show mb-4" role="alert">
        <i class="fas fa-triangle-exclamation me-2"></i>
        <span th:text="${errorMessage}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
      </div>

      <!-- Form -->
      <form th:action="@{/admin/team/save}"
            th:object="${member}"
            method="post"
            enctype="multipart/form-data"
            novalidate>

        <input type="hidden" th:field="*{id}" />

        <div class="row g-4">

          <!-- Left column: photo + settings -->
          <div class="col-lg-4">

            <!-- Photo card -->
            <div class="admin-card mb-4">
              <div class="card-header">
                <span class="fw-semibold" style="color:var(--navy);">Profile Photo</span>
              </div>
              <div class="card-body p-4 text-center">

                <!-- Photo preview circle -->
                <div class="photo-preview-wrap"
                     onclick="document.getElementById('photoFile').click()"
                     title="Click to change photo">
                  <!-- Current photo -->
                  <img id="photoPreviewImg"
                       th:if="${member != null and member.photo != null}"
                       th:src="@{${member.photo}}"
                       alt="Member photo" />
                  <!-- Placeholder when no photo -->
                  <div th:unless="${member != null and member.photo != null}"
                       id="photoPlaceholder"
                       style="color:#9ca3af; font-size:2.5rem;">
                    <i class="fas fa-user"></i>
                  </div>
                  <div class="photo-overlay">
                    <i class="fas fa-camera"></i>
                  </div>
                </div>

                <p class="text-muted small mb-3">Click the circle to upload a photo</p>

                <input type="file"
                       id="photoFile"
                       name="photoFile"
                       accept="image/*"
                       class="d-none"
                       onchange="previewPhoto(this)" />

                <div class="form-text">Recommended: square image, min 400x400px.</div>

              </div>
            </div>

            <!-- Display settings card -->
            <div class="admin-card">
              <div class="card-header">
                <span class="fw-semibold" style="color:var(--navy);">Display Settings</span>
              </div>
              <div class="card-body p-4">

                <!-- Display order -->
                <div class="mb-3">
                  <label for="displayOrder" class="form-label">Display Order</label>
                  <input type="number"
                         id="displayOrder"
                         th:field="*{displayOrder}"
                         class="form-control"
                         min="0"
                         placeholder="0" />
                  <div class="form-text">Lower numbers appear first.</div>
                </div>

                <!-- Active toggle -->
                <div class="form-check form-switch">
                  <input class="form-check-input"
                         type="checkbox"
                         id="active"
                         th:field="*{active}"
                         role="switch" />
                  <label class="form-check-label fw-semibold" for="active" style="color:#374151;">
                    Show on website
                  </label>
                </div>
                <div class="form-text mt-1">Inactive members are hidden from the public team page.</div>

              </div>
            </div>

          </div><!-- /col-lg-4 -->

          <!-- Right column: details -->
          <div class="col-lg-8">

            <!-- Personal info card -->
            <div class="admin-card mb-4">
              <div class="card-header">
                <span class="fw-semibold" style="color:var(--navy);">Personal Information</span>
              </div>
              <div class="card-body p-4">

                <!-- Name -->
                <div class="mb-3">
                  <label for="name" class="form-label">
                    Name <span class="text-danger">*</span>
                  </label>
                  <input type="text"
                         id="name"
                         th:field="*{name}"
                         class="form-control"
                         th:classappend="${#fields.hasErrors('name')} ? 'is-invalid' : ''"
                         placeholder="Full name"
                         required />
                  <div class="invalid-feedback"
                       th:if="${#fields.hasErrors('name')}"
                       th:errors="*{name}">Name error</div>
                </div>

                <!-- Designation -->
                <div class="mb-3">
                  <label for="designation" class="form-label">Designation / Job Title</label>
                  <input type="text"
                         id="designation"
                         th:field="*{designation}"
                         class="form-control"
                         placeholder="e.g. Senior Project Manager" />
                </div>

                <!-- Description -->
                <div class="mb-0">
                  <label for="description" class="form-label">Bio / Description</label>
                  <textarea id="description"
                            th:field="*{description}"
                            class="form-control"
                            rows="5"
                            placeholder="Short biography or professional background…"></textarea>
                </div>

              </div>
            </div>

            <!-- Social links card -->
            <div class="admin-card mb-4">
              <div class="card-header">
                <span class="fw-semibold" style="color:var(--navy);">Social Links</span>
              </div>
              <div class="card-body p-4">

                <!-- Facebook -->
                <div class="mb-3">
                  <label for="facebook" class="form-label">Facebook</label>
                  <div class="input-group">
                    <span class="input-group-text social-icon">
                      <i class="fab fa-facebook-f" style="color:#1877f2;"></i>
                    </span>
                    <input type="url"
                           id="facebook"
                           th:field="*{facebook}"
                           class="form-control"
                           placeholder="https://facebook.com/username" />
                  </div>
                </div>

                <!-- LinkedIn -->
                <div class="mb-3">
                  <label for="linkedin" class="form-label">LinkedIn</label>
                  <div class="input-group">
                    <span class="input-group-text social-icon">
                      <i class="fab fa-linkedin-in" style="color:#0a66c2;"></i>
                    </span>
                    <input type="url"
                           id="linkedin"
                           th:field="*{linkedin}"
                           class="form-control"
                           placeholder="https://linkedin.com/in/username" />
                  </div>
                </div>

                <!-- Instagram -->
                <div class="mb-0">
                  <label for="instagram" class="form-label">Instagram</label>
                  <div class="input-group">
                    <span class="input-group-text social-icon">
                      <i class="fab fa-instagram" style="color:#e1306c;"></i>
                    </span>
                    <input type="url"
                           id="instagram"
                           th:field="*{instagram}"
                           class="form-control"
                           placeholder="https://instagram.com/username" />
                  </div>
                </div>

              </div>
            </div>

            <!-- Action buttons -->
            <div class="d-flex gap-2">
              <button type="submit" class="btn btn-orange">
                <i class="fas fa-save me-1"></i>
                <span th:text="${member != null and member.id != null} ? 'Update Member' : 'Save Member'">Save Member</span>
              </button>
              <a href="/admin/team" class="btn btn-outline-secondary">
                <i class="fas fa-times me-1"></i> Cancel
              </a>
            </div>

          </div><!-- /col-lg-8 -->

        </div><!-- /row -->

      </form>

    </main>
  </div>
</div>

<!-- Bootstrap 5.3 JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
        crossorigin="anonymous"></script>

<script>
  function previewPhoto(input) {
    if (input.files && input.files[0]) {
      const reader = new FileReader();
      reader.onload = function (e) {
        let img = document.getElementById('photoPreviewImg');
        const placeholder = document.getElementById('photoPlaceholder');

        if (!img) {
          // Create the img element if it doesn't exist yet
          img = document.createElement('img');
          img.id = 'photoPreviewImg';
          img.alt = 'Member photo';
          img.style.cssText = 'width:100%;height:100%;object-fit:cover;';
          const wrap = input.closest('form').querySelector('.photo-preview-wrap');
          if (placeholder) placeholder.style.display = 'none';
          wrap.insertBefore(img, wrap.querySelector('.photo-overlay'));
        }

        img.src = e.target.result;
        img.style.display = 'block';
        if (placeholder) placeholder.style.display = 'none';
      };
      reader.readAsDataURL(input.files[0]);
    }
  }
</script>
  <script src="/js/main.js"></script>
</body>
</html>
