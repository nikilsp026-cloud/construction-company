<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title th:text="${settings != null and settings['site_name'] != null ? settings['site_name'] + ' - Admin: Team' : 'Admin: Team'}">Admin: Team</title>

  <!-- Bootstrap 5.3 CDN -->
  <link rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
        crossorigin="anonymous" />

  <!-- Font Awesome 6 CDN -->
  <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"
        integrity="sha512-SnH5WK+bZxgPHs44uWIX+LLJAJ9/2PkPKZ5QiAj6Ta86w+fsb2TkcmfRyVX3pBnMFcV7oQPJkl9QevSCWr3W6A=="
        crossorigin="anonymous"
        referrerpolicy="no-referrer" />

    <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Poppins:wght@600;700;800&display=swap" rel="stylesheet">
  <!-- Shared design system -->
  <link rel="stylesheet" href="/css/main.css"/>
  <style>
    :root {
      --navy:  var(--navy);
      --orange: var(--orange);
    }
    body { background-color: #f0f2f5; }

    .admin-card {
      background: #fff;
      border: 1px solid #e2e8f0;
      border-radius: 8px;
    }
    .admin-card .card-header {
      background: transparent;
      border-bottom: 1px solid #e2e8f0;
      padding: 1rem 1.25rem;
    }
    .table th {
      font-size: 0.78rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: #64748b;
      border-top: none;
    }
    .btn-orange {
      background-color: var(--orange);
      border-color: var(--orange);
      color: #fff;
    }
    .btn-orange:hover {
      background-color: #e0831a;
      border-color: #e0831a;
      color: #fff;
    }
    .btn-action {
      padding: 0.25rem 0.55rem;
      font-size: 0.8rem;
    }
    .member-photo {
      width: 48px;
      height: 48px;
      object-fit: cover;
      border-radius: 50%;
      border: 2px solid #e2e8f0;
    }
    .member-avatar {
      width: 48px;
      height: 48px;
      border-radius: 50%;
      background: var(--navy);
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      font-size: 1rem;
      flex-shrink: 0;
    }
    .admin-sidebar .nav-link:hover {
      background-color: rgba(247, 148, 29, 0.18) !important;
      color: var(--orange) !important;
    }
  </style>
</head>
<body class="admin-body">

<div class="d-flex" style="min-height:100vh;">

  <!-- SIDEBAR -->
  <div th:replace="~{fragments/admin-sidebar :: adminSidebar}"></div>

  <!-- MAIN WRAPPER -->
  <div class="d-flex flex-column flex-grow-1 overflow-hidden">

    <!-- TOPBAR -->
    <div th:replace="~{fragments/admin-topbar :: adminTopbar('Team Members')}"></div>

    <!-- PAGE CONTENT -->
    <main class="flex-grow-1 p-4" style="overflow-y:auto;">

      <!-- Page heading -->
      <div class="d-flex align-items-center justify-content-between mb-4 flex-wrap gap-2">
        <div>
          <h4 class="fw-bold mb-0" style="color:var(--navy);">
            <i class="fas fa-users me-2" style="color:var(--orange);"></i>Team Members
          </h4>
          <p class="text-muted small mb-0">Manage the company team and profiles</p>
        </div>
        <a href="/admin/team/new" class="btn btn-orange">
          <i class="fas fa-plus me-1"></i> Add Member
        </a>
      </div>

      <!-- Flash messages -->
      <div th:if="${successMessage}"
           class="alert alert-success alert-dismissible fade show" role="alert">
        <i class="fas fa-circle-check me-2"></i>
        <span th:text="${successMessage}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
      </div>
      <div th:if="${errorMessage}"
           class="alert alert-danger alert-dismissible fade show" role="alert">
        <i class="fas fa-triangle-exclamation me-2"></i>
        <span th:text="${errorMessage}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
      </div>

      <!-- Team table card -->
      <div class="admin-card">
        <div class="card-header d-flex align-items-center justify-content-between">
          <span class="fw-semibold text-secondary small">
            <span th:text="${members != null} ? ${#lists.size(members)} : '0'">0</span> member(s)
          </span>
          <span class="text-muted small">
            <i class="fas fa-info-circle me-1"></i>Drag rows to reorder (if drag-and-drop enabled)
          </span>
        </div>

        <div class="table-responsive">
          <table class="table table-hover align-middle mb-0">
            <thead class="table-light">
              <tr>
                <th style="width:70px;" class="ps-4">Photo</th>
                <th>Name</th>
                <th>Designation</th>
                <th class="text-center">Status</th>
                <th class="text-center">Order</th>
                <th class="text-end pe-4">Actions</th>
              </tr>
            </thead>
            <tbody>

              <!-- Empty state -->
              <tr th:if="${members == null or #lists.isEmpty(members)}">
                <td colspan="6" class="text-center py-5 text-muted">
                  <i class="fas fa-user-slash fa-2x mb-2 d-block" style="color:#cbd5e1;"></i>
                  No team members yet.
                  <a href="/admin/team/new" style="color:var(--orange);">Add your first member.</a>
                </td>
              </tr>

              <!-- Member rows -->
              <tr th:each="member : ${members}">
                <td class="ps-4">
                  <img th:if="${member.photo != null}"
                       th:src="@{${member.photo}}"
                       th:alt="${member.name}"
                       class="member-photo" />
                  <div th:unless="${member.photo != null}" class="member-avatar">
                    <span th:text="${member.name != null and !member.name.isEmpty() ? member.name.substring(0,1).toUpperCase() : '?'}">?</span>
                  </div>
                </td>
                <td>
                  <div class="fw-semibold" style="color:var(--navy);" th:text="${member.name}">Name</div>
                </td>
                <td>
                  <span class="text-muted small"
                        th:text="${member.designation != null} ? ${member.designation} : '—'">—</span>
                </td>
                <td class="text-center">
                  <span th:if="${member.active}"
                        class="badge bg-success fw-normal">Active</span>
                  <span th:unless="${member.active}"
                        class="badge bg-secondary fw-normal">Inactive</span>
                </td>
                <td class="text-center">
                  <span class="badge bg-light text-secondary border fw-normal"
                        th:text="${member.displayOrder != null} ? ${member.displayOrder} : '—'">—</span>
                </td>
                <td class="text-end pe-4">
                  <a th:href="@{/admin/team/{id}/edit(id=${member.id})}"
                     class="btn btn-sm btn-outline-secondary btn-action me-1"
                     title="Edit">
                    <i class="fas fa-pen-to-square"></i>
                  </a>
                  <form th:action="@{/admin/team/{id}/delete(id=${member.id})}"
                        method="post"
                        class="d-inline"
                        onsubmit="return confirm('Remove this team member? This cannot be undone.');">
                    <input type="hidden" name="_method" value="DELETE" />
                    <button type="submit"
                            class="btn btn-sm btn-outline-danger btn-action"
                            title="Delete">
                      <i class="fas fa-trash"></i>
                    </button>
                  </form>
                </td>
              </tr>

            </tbody>
          </table>
        </div><!-- /table-responsive -->

      </div><!-- /admin-card -->

    </main>
  </div>
</div>

<!-- Bootstrap 5.3 JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
        crossorigin="anonymous"></script>
  <script src="/js/main.js"></script>
</body>
</html>
