<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title th:text="${settings != null and settings['site_name'] != null ? settings['site_name'] + ' - Admin: Testimonials' : 'Admin: Testimonials'}">Admin: Testimonials</title>

  <!-- Bootstrap 5.3 CDN -->
  <link rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
        crossorigin="anonymous" />

  <!-- Font Awesome 6 CDN -->
  <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"
        integrity="sha512-SnH5WK+bZxgPHs44uWIX+LLJAJ9/2PkPKZ5QiAj6Ta86w+fsb2TkcmfRyVX3pBnMFcV7oQPJkl9QevSCWr3W6A=="
        crossorigin="anonymous"
        referrerpolicy="no-referrer" />

    <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Poppins:wght@600;700;800&display=swap" rel="stylesheet">
  <!-- Shared design system -->
  <link rel="stylesheet" href="/css/main.css"/>
  <style>
    :root {
      --navy:  var(--navy);
      --orange: var(--orange);
    }
    body { background-color: #f0f2f5; }

    .admin-card {
      background: #fff;
      border: 1px solid #e2e8f0;
      border-radius: 8px;
    }
    .admin-card .card-header {
      background: transparent;
      border-bottom: 1px solid #e2e8f0;
      padding: 1rem 1.25rem;
    }
    .table th {
      font-size: 0.78rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: #64748b;
      border-top: none;
    }
    .btn-orange {
      background-color: var(--orange);
      border-color: var(--orange);
      color: #fff;
    }
    .btn-orange:hover {
      background-color: #e0831a;
      border-color: #e0831a;
      color: #fff;
    }
    .btn-action {
      padding: 0.25rem 0.55rem;
      font-size: 0.8rem;
    }
    .badge-status {
      font-size: 0.72rem;
      padding: 0.3em 0.65em;
      border-radius: 4px;
      font-weight: 600;
    }
    .star-rating { color: var(--orange); font-size: 0.85rem; letter-spacing: 1px; }
    .star-empty  { color: #d1d5db; }
    .admin-sidebar .nav-link:hover {
      background-color: rgba(247, 148, 29, 0.18) !important;
      color: var(--orange) !important;
    }
  </style>
</head>
<body class="admin-body">

<div class="d-flex" style="min-height:100vh;">

  <!-- SIDEBAR -->
  <div th:replace="~{fragments/admin-sidebar :: adminSidebar}"></div>

  <!-- MAIN WRAPPER -->
  <div class="d-flex flex-column flex-grow-1 overflow-hidden">

    <!-- TOPBAR -->
    <div th:replace="~{fragments/admin-topbar :: adminTopbar('Testimonials')}"></div>

    <!-- PAGE CONTENT -->
    <main class="flex-grow-1 p-4" style="overflow-y:auto;">

      <!-- Page heading -->
      <div class="d-flex align-items-center justify-content-between mb-4 flex-wrap gap-2">
        <div>
          <h4 class="fw-bold mb-0" style="color:var(--navy);">
            <i class="fas fa-star me-2" style="color:var(--orange);"></i>Testimonials
          </h4>
          <p class="text-muted small mb-0">Manage customer reviews and testimonials</p>
        </div>
        <a href="/admin/testimonials/new" class="btn btn-orange">
          <i class="fas fa-plus me-1"></i> Add Testimonial
        </a>
      </div>

      <!-- Flash messages -->
      <div th:if="${successMessage}"
           class="alert alert-success alert-dismissible fade show" role="alert">
        <i class="fas fa-circle-check me-2"></i>
        <span th:text="${successMessage}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
      </div>
      <div th:if="${errorMessage}"
           class="alert alert-danger alert-dismissible fade show" role="alert">
        <i class="fas fa-triangle-exclamation me-2"></i>
        <span th:text="${errorMessage}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
      </div>

      <!-- Testimonials table card -->
      <div class="admin-card">
        <div class="card-header d-flex align-items-center justify-content-between">
          <span class="fw-semibold text-secondary small">
            <span th:text="${testimonials != null} ? ${testimonials.totalElements} : '0'">0</span> testimonial(s) total
          </span>
        </div>

        <div class="table-responsive">
          <table class="table table-hover align-middle mb-0">
            <thead class="table-light">
              <tr>
                <th style="width:22%;" class="ps-4">Customer</th>
                <th>Company</th>
                <th class="text-center">Rating</th>
                <th style="width:30%;">Review</th>
                <th class="text-center">Status</th>
                <th>Date</th>
                <th class="text-end pe-4">Actions</th>
              </tr>
            </thead>
            <tbody>

              <!-- Empty state -->
              <tr th:if="${testimonials == null or testimonials.isEmpty()}">
                <td colspan="7" class="text-center py-5 text-muted">
                  <i class="fas fa-comments fa-2x mb-2 d-block" style="color:#cbd5e1;"></i>
                  No testimonials yet.
                  <a href="/admin/testimonials/new" style="color:var(--orange);">Add your first review.</a>
                </td>
              </tr>

              <!-- Testimonial rows -->
              <tr th:each="t : ${testimonials}">
                <td class="ps-4">
                  <div class="fw-semibold" style="color:var(--navy);" th:text="${t.customerName}">Customer Name</div>
                </td>
                <td>
                  <span class="text-muted small"
                        th:text="${t.company != null} ? ${t.company} : '—'">—</span>
                </td>
                <td class="text-center">
                  <!-- Star display: filled stars + empty stars -->
                  <span th:with="r=${t.rating != null ? t.rating : 0}">
                    <span class="star-rating">
                      <i class="fas fa-star" th:if="${r >= 1}"></i>
                      <i class="fas fa-star" th:if="${r >= 2}"></i>
                      <i class="fas fa-star" th:if="${r >= 3}"></i>
                      <i class="fas fa-star" th:if="${r >= 4}"></i>
                      <i class="fas fa-star" th:if="${r >= 5}"></i>
                      <!-- empty stars -->
                      <i class="fas fa-star star-empty" th:if="${r < 5 and r >= 4}"></i>
                      <i class="fas fa-star star-empty" th:if="${r < 4 and r >= 3}"></i>
                      <i class="fas fa-star star-empty" th:if="${r < 3 and r >= 2}"></i>
                      <i class="fas fa-star star-empty" th:if="${r < 2 and r >= 1}"></i>
                      <i class="fas fa-star star-empty" th:if="${r < 1}"></i>
                    </span>
                    <span class="text-muted small ms-1" th:text="'(' + ${r} + '/5)'"></span>
                  </span>
                </td>
                <td>
                  <span class="text-muted small"
                        style="display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;"
                        th:text="${t.comment != null} ? ${#strings.abbreviate(t.comment, 100)} : '—'">Review text…</span>
                </td>
                <td class="text-center">
                  <span class="badge-status"
                        th:with="s=${t.status != null ? t.status.name() : 'PENDING'}"
                        th:classappend="${s == 'APPROVED'} ? 'bg-success text-white'
                                      : (${s == 'PENDING'}  ? 'bg-warning text-dark'
                                      : (${s == 'REJECTED'} ? 'bg-danger text-white'
                                      : 'bg-secondary text-white'))"
                        th:text="${t.status != null} ? ${t.status.name()} : 'PENDING'">
                    PENDING
                  </span>
                </td>
                <td>
                  <span class="text-muted small"
                        th:text="${t.createdAt != null ? #temporals.format(t.createdAt, 'dd MMM yyyy') : '—'}">—</span>
                </td>
                <td class="text-end pe-4">
                  <a th:href="@{/admin/testimonials/{id}/edit(id=${t.id})}"
                     class="btn btn-sm btn-outline-secondary btn-action me-1"
                     title="Edit">
                    <i class="fas fa-pen-to-square"></i>
                  </a>
                  <form th:action="@{/admin/testimonials/{id}/delete(id=${t.id})}"
                        method="post"
                        class="d-inline"
                        onsubmit="return confirm('Delete this testimonial? This cannot be undone.');">
                    <input type="hidden" name="_method" value="DELETE" />
                    <button type="submit"
                            class="btn btn-sm btn-outline-danger btn-action"
                            title="Delete">
                      <i class="fas fa-trash"></i>
                    </button>
                  </form>
                </td>
              </tr>

            </tbody>
          </table>
        </div><!-- /table-responsive -->

        <!-- Pagination -->
        <div class="card-footer bg-transparent border-top d-flex align-items-center
                    justify-content-between flex-wrap gap-2 py-2 px-3"
             th:if="${testimonials != null and testimonials.totalPages > 1}">
          <small class="text-muted">
            Page <span th:text="${testimonials.number + 1}">1</span> of
            <span th:text="${testimonials.totalPages}">1</span>
          </small>
          <nav aria-label="Testimonials pagination">
            <ul class="pagination pagination-sm mb-0">
              <li class="page-item" th:classappend="${testimonials.first} ? 'disabled' : ''">
                <a class="page-link"
                   th:href="@{/admin/testimonials(page=${testimonials.number - 1})}"
                   aria-label="Previous">
                  <i class="fas fa-chevron-left"></i>
                </a>
              </li>
              <li class="page-item"
                  th:each="i : ${#numbers.sequence(0, testimonials.totalPages - 1)}"
                  th:classappend="${i == testimonials.number} ? 'active' : ''">
                <a class="page-link"
                   th:href="@{/admin/testimonials(page=${i})}"
                   th:text="${i + 1}">1</a>
              </li>
              <li class="page-item" th:classappend="${testimonials.last} ? 'disabled' : ''">
                <a class="page-link"
                   th:href="@{/admin/testimonials(page=${testimonials.number + 1})}"
                   aria-label="Next">
                  <i class="fas fa-chevron-right"></i>
                </a>
              </li>
            </ul>
          </nav>
        </div><!-- /pagination -->

      </div><!-- /admin-card -->

    </main>
  </div>
</div>

<!-- Bootstrap 5.3 JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
        crossorigin="anonymous"></script>
  <script src="/js/main.js"></script>
</body>
</html>
