<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title th:text="${settings != null and settings['site_name'] != null} ? ${settings['site_name']} + ' - Forgot Password' : 'KV Construction &amp; Interior - Forgot Password'">KV Construction &amp; Interior - Forgot Password</title>
  <meta name="robots" content="noindex, nofollow"/>

  <!-- Bootstrap 5.3 CDN -->
  <link rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
        crossorigin="anonymous" />

  <!-- Font Awesome 6 CDN -->
  <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"
        integrity="sha512-SnH5WK+bZxgPHs44uWIX+LLJAJ9/2PkPKZ5QiAj6Ta86w+fsb2TkcmfRyVX3pBnMFcV7oQPJkl9QevSCWr3W6A=="
        crossorigin="anonymous"
        referrerpolicy="no-referrer" />

    <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Outfit:wght@500;600;700;800&display=swap" rel="stylesheet">
  <!-- Shared design system -->
  <link rel="stylesheet" href="/css/main.css"/>
</head>

<body class="d-flex flex-column min-vh-100">

  <!-- ===== NAVBAR ===== -->
  <div th:replace="~{fragments/navbar :: navbar}"></div>

  <!-- ===== MAIN ===== -->
  <main>

    <!-- Dark hero strip for visual depth -->
    <div class="login-hero">
      <div class="container text-center">
        <h1 class="text-white fw-bold fs-3 mb-1">Forgot Password</h1>
        <p class="text-white-50 mb-0">Enter your admin email to receive a reset link</p>
      </div>
    </div>

    <!-- Card -->
    <div class="container login-card-wrapper pb-5">
      <div class="row justify-content-center">
        <div class="col-12 col-sm-10 col-md-8 col-lg-5">

          <div class="card login-card">

            <div class="card-header text-center">
              <div class="brand-icon">
                <img src="/img/logo-mark.png" alt="" style="width:34px;height:auto;"/>
              </div>
              <h2 class="text-white fw-bold fs-5 mb-1"
                  th:text="${settings != null and settings['site_name'] != null} ? ${settings['site_name']} : 'KV Construction &amp; Interior'">
                KV Construction &amp; Interior
              </h2>
            </div>

            <div class="card-body p-4 p-md-5">

              <div th:if="${successMessage}" class="alert alert-success d-flex align-items-center gap-2 mb-4" role="alert">
                <i class="fa-solid fa-circle-check flex-shrink-0"></i>
                <span th:text="${successMessage}"></span>
              </div>
              <div th:if="${errorMessage}" class="alert alert-danger d-flex align-items-center gap-2 mb-4" role="alert">
                <i class="fa-solid fa-circle-exclamation flex-shrink-0"></i>
                <span th:text="${errorMessage}"></span>
              </div>

              <form method="post" th:action="@{/forgot-password}" novalidate>
                <div class="mb-4">
                  <label for="email" class="form-label fw-semibold text-secondary small">
                    <i class="fa-solid fa-envelope me-1"></i>Admin Email
                  </label>
                  <input type="email"
                         id="email"
                         name="email"
                         class="form-control"
                         placeholder="Enter your admin account email"
                         required
                         autofocus />
                </div>

                <div class="d-grid mb-3">
                  <button type="submit" class="btn btn-orange btn-lg">
                    <i class="fa-solid fa-paper-plane me-2"></i>Send Reset Link
                  </button>
                </div>
              </form>

              <div class="text-center mt-3">
                <a href="/login" class="btn btn-outline-secondary btn-sm px-4">
                  <i class="fa-solid fa-arrow-left me-1"></i>Back to Login
                </a>
              </div>

            </div><!-- /card-body -->

          </div><!-- /card -->

        </div><!-- /col -->
      </div><!-- /row -->
    </div><!-- /container -->

  </main>

  <!-- ===== FOOTER ===== -->
  <div th:replace="~{fragments/footer :: footer}"></div>

  <!-- Bootstrap 5.3 JS bundle -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
          integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
          crossorigin="anonymous"></script>
  <script src="/js/main.js"></script>
</body>
</html>
