<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>

<nav th:fragment="adminSidebar"
     class="admin-sidebar d-flex flex-column text-white"
     style="width:264px; min-width:264px; min-height:100vh;
            position:sticky; top:0; height:100vh; overflow-y:auto; flex-shrink:0;">

  <!-- Brand -->
  <a href="/admin/dashboard"
     class="admin-sidebar-brand text-decoration-none text-white d-flex align-items-center gap-2 px-3 py-4">
    <img src="/img/logo-mark.png" alt="" class="flex-shrink-0" style="width:32px; height:auto;"/>
    <div>
      <div class="fw-bold lh-1" style="font-size:0.95rem;"
           th:text="${settings != null and settings['site_name'] != null} ? ${settings['site_name']} : 'KV Construction'">KV Construction</div>
      <div class="lh-1 mt-1" style="font-size:0.68rem; color:var(--orange-light); letter-spacing:.06em; text-transform:uppercase;">Admin Panel</div>
    </div>
  </a>

  <!-- Navigation -->
  <div class="flex-grow-1 px-2 pt-3 pb-2">

    <div class="admin-sidebar-label">Overview</div>
    <ul class="nav flex-column" style="gap:2px; list-style:none;">
      <li>
        <a href="/admin/dashboard" class="nav-link admin-sidebar-link">
          <span class="admin-sidebar-icon"><i class="fas fa-tachometer-alt"></i></span>
          <span>Dashboard</span>
        </a>
      </li>
    </ul>

    <div class="admin-sidebar-label">Content</div>
    <ul class="nav flex-column" style="gap:2px; list-style:none;">
      <li>
        <a href="/admin/projects" class="nav-link admin-sidebar-link">
          <span class="admin-sidebar-icon"><i class="fas fa-building"></i></span>
          <span>Projects</span>
        </a>
      </li>
      <li>
        <a href="/admin/services" class="nav-link admin-sidebar-link">
          <span class="admin-sidebar-icon"><i class="fas fa-cogs"></i></span>
          <span>Services</span>
        </a>
      </li>
      <li>
        <a href="/admin/blog" class="nav-link admin-sidebar-link">
          <span class="admin-sidebar-icon"><i class="fas fa-blog"></i></span>
          <span>Blog</span>
        </a>
      </li>
      <li>
        <a href="/admin/gallery" class="nav-link admin-sidebar-link">
          <span class="admin-sidebar-icon"><i class="fas fa-images"></i></span>
          <span>Gallery</span>
        </a>
      </li>
      <li>
        <a href="/admin/team" class="nav-link admin-sidebar-link">
          <span class="admin-sidebar-icon"><i class="fas fa-users"></i></span>
          <span>Team</span>
        </a>
      </li>
      <li>
        <a href="/admin/testimonials" class="nav-link admin-sidebar-link">
          <span class="admin-sidebar-icon"><i class="fas fa-star"></i></span>
          <span>Testimonials</span>
        </a>
      </li>
    </ul>

    <div class="admin-sidebar-label">Engagement</div>
    <ul class="nav flex-column" style="gap:2px; list-style:none;">
      <li>
        <a href="/admin/contacts" class="nav-link admin-sidebar-link">
          <span class="admin-sidebar-icon"><i class="fas fa-envelope"></i></span>
          <span class="flex-grow-1">Contact Messages</span>
          <span th:if="${unreadCount != null and unreadCount > 0}"
                th:text="${unreadCount}"
                class="badge rounded-pill"
                style="background:#dc3545; font-size:0.68rem;"></span>
        </a>
      </li>
      <li>
        <a href="/admin/quotes" class="nav-link admin-sidebar-link">
          <span class="admin-sidebar-icon"><i class="fas fa-file-invoice"></i></span>
          <span>Quote Requests</span>
        </a>
      </li>
    </ul>

    <div class="admin-sidebar-label">System</div>
    <ul class="nav flex-column" style="gap:2px; list-style:none;">
      <li>
        <a href="/admin/settings" class="nav-link admin-sidebar-link">
          <span class="admin-sidebar-icon"><i class="fas fa-sliders-h"></i></span>
          <span>Settings</span>
        </a>
      </li>
    </ul>

  </div>

  <!-- Logout -->
  <div class="admin-sidebar-footer px-2 pb-3 pt-2">
    <a href="/logout" class="nav-link admin-sidebar-link">
      <span class="admin-sidebar-icon"><i class="fas fa-sign-out-alt"></i></span>
      <span>Logout</span>
    </a>
  </div>

</nav>

</body>
</html>
