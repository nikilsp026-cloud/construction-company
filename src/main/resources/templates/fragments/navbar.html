<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>

<nav th:fragment="navbar"
     class="site-navbar navbar navbar-expand-xl navbar-light fixed-top">

  <div class="container d-flex align-items-center justify-content-between position-relative">

    <!-- Brand -->
    <a class="navbar-brand brand-mark py-0 me-0" href="/">
      <img src="/img/logo-mark.png" alt="" class="brand-mark-img"/>
      <span class="d-flex flex-column">
        <span class="brand-wordmark" th:text="${settings != null and settings['site_name'] != null} ? ${settings['site_name']} : 'KV Construction'">KV Construction</span>
        <span class="brand-tagline">Construction &amp; Interior</span>
      </span>
    </a>

    <!-- Nav links (collapses on mobile) -->
    <div class="collapse navbar-collapse flex-grow-0" id="mainNavbar">
      <ul class="navbar-nav navbar-nav-center align-items-xl-center gap-xl-1">

        <li class="nav-item">
          <a class="nav-link px-2"
             th:classappend="${activePage == 'home'} ? 'active fw-semibold' : ''"
             href="/">Home</a>
        </li>

        <li class="nav-item">
          <a class="nav-link px-2"
             th:classappend="${activePage == 'about'} ? 'active fw-semibold' : ''"
             href="/about">About</a>
        </li>

        <li class="nav-item">
          <a class="nav-link px-2"
             th:classappend="${activePage == 'services'} ? 'active fw-semibold' : ''"
             href="/services">Services</a>
        </li>

        <li class="nav-item">
          <a class="nav-link px-2"
             th:classappend="${activePage == 'projects'} ? 'active fw-semibold' : ''"
             href="/projects">Projects</a>
        </li>

        <li class="nav-item">
          <a class="nav-link px-2"
             th:classappend="${activePage == 'gallery'} ? 'active fw-semibold' : ''"
             href="/gallery">Gallery</a>
        </li>

        <li class="nav-item">
          <a class="nav-link px-2"
             th:classappend="${activePage == 'blog'} ? 'active fw-semibold' : ''"
             href="/blog">Blog</a>
        </li>

        <li class="nav-item">
          <a class="nav-link px-2"
             th:classappend="${activePage == 'contact'} ? 'active fw-semibold' : ''"
             href="/contact">Contact</a>
        </li>

        <!-- CTA shown inline in the collapsed mobile menu only -->
        <li class="nav-item ms-xl-2 mt-2 mt-xl-0 d-xl-none">
          <a class="btn btn-orange btn-sm fw-semibold px-3 py-2"
             th:classappend="${activePage == 'quote'} ? 'active' : ''"
             href="/quote">
            Get a Quote
          </a>
        </li>

      </ul>
    </div><!-- /.collapse -->

    <!-- Right side: CTA (desktop) + hamburger -->
    <div class="d-flex align-items-center gap-2">
      <a class="btn btn-orange btn-sm fw-semibold px-3 py-2 d-none d-xl-inline-flex align-items-center gap-2"
         th:classappend="${activePage == 'quote'} ? 'active' : ''"
         href="/quote">
        Get a Quote <i class="fa-solid fa-arrow-right"></i>
      </a>

      <button class="navbar-toggler border-0"
              type="button"
              data-bs-toggle="collapse"
              data-bs-target="#mainNavbar"
              aria-controls="mainNavbar"
              aria-expanded="false"
              aria-label="Toggle navigation">
        <span class="navbar-toggler-icon"></span>
      </button>
    </div>

  </div><!-- /.container -->

</nav>

</body>
</html>
