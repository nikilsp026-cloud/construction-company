<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title th:text="${settings != null and settings['site_name'] != null} ? ${settings['site_name']} + ' — Gallery' : 'KV Construction &amp; Interior — Gallery'">KV Construction &amp; Interior — Gallery</title>
  <meta name="description" content="View photos from our completed construction and interior design projects."/>
  <meta property="og:title" content="Gallery"/>
  <meta property="og:description" content="View photos from our completed construction and interior design projects."/>
  <meta property="og:type" content="website"/>
  <meta property="og:image" content="/img/hero-villa.jpg"/>

  <!-- Bootstrap 5.3 -->
  <link rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
        crossorigin="anonymous"/>
  <!-- Font Awesome 6 -->
  <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"
        integrity="sha512-SnH5WK+bZxgPHs44uWIX+LLJAJ9/2PkPKZ5QiAj6Ta86w+fsb2TkcmfRyVX3pBnMFcV7oQPJkl9QevSCWr3W6A=="
        crossorigin="anonymous"
        referrerpolicy="no-referrer"/>
  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Outfit:wght@500;600;700;800&display=swap" rel="stylesheet">
  <!-- Shared design system -->
  <link rel="stylesheet" href="/css/main.css"/>
</head>

<body class="d-flex flex-column min-vh-100">

  <!-- Navbar fragment -->
  <div th:replace="~{fragments/navbar :: navbar}"></div>

  <!-- ==================== PAGE HERO ==================== -->
  <section class="page-hero text-center">
    <div class="container">
      <p class="section-label">
        <i class="fa-solid fa-images me-1"></i>Our Work in Photos
      </p>
      <h1 class="mb-3">Our Gallery</h1>
      <p class="mb-4 fs-5" style="color: rgba(255,255,255,.70);"
         th:text="${settings != null and settings['site_tagline'] != null} ? ${settings['site_tagline']} : 'A visual journey through our finest projects.'">
        A visual journey through our finest projects.
      </p>
      <nav aria-label="breadcrumb">
        <ol class="breadcrumb justify-content-center mb-0">
          <li class="breadcrumb-item"><a href="/">Home</a></li>
          <li class="breadcrumb-item active" aria-current="page">Gallery</li>
        </ol>
      </nav>
    </div>
  </section>

  <!-- ==================== GALLERY SECTION ==================== -->
  <section class="py-5" style="padding-top: 4rem !important; padding-bottom: 5rem !important;">
    <div class="container">

      <!-- Section intro -->
      <div class="text-center mb-5">
        <p class="section-label">Browse by Category</p>
        <div class="section-divider"></div>
      </div>

      <!-- Category filter tabs -->
      <div class="d-flex justify-content-center mb-5">
        <ul class="nav gap-2 flex-wrap filter-tabs justify-content-center">

          <!-- "All" tab -->
          <li class="nav-item">
            <a class="nav-link"
               th:classappend="${currentCategory == null or currentCategory == ''} ? 'active-filter' : ''"
               th:href="@{/gallery}">
              <i class="fa-solid fa-th me-1"></i>All
            </a>
          </li>

          <!-- Category tabs from model -->
          <li class="nav-item" th:each="cat : ${categories}">
            <a class="nav-link"
               th:classappend="${currentCategory != null and currentCategory == cat} ? 'active-filter' : ''"
               th:href="@{/gallery(category=${cat})}"
               th:text="${cat}">Category</a>
          </li>

        </ul>
      </div>

      <!-- Gallery grid -->
      <div th:if="${items != null and !items.empty}">
        <div class="row g-4">
          <div class="col-12 col-sm-6 col-lg-4" th:each="item : ${items.content}">
            <a class="gallery-item shadow-sm"
               th:href="${item.imageUrl}"
               th:data-bs-toggle="${item.imageUrl != null} ? 'modal' : ''"
               th:data-bs-target="${item.imageUrl != null} ? '#lightboxModal' : ''"
               th:data-img="${item.imageUrl}"
               th:data-title="${item.title}"
               href="#"
               data-bs-toggle="modal"
               data-bs-target="#lightboxModal">

              <!-- Image -->
              <img th:if="${item.imageUrl != null and !item.imageUrl.isEmpty()}"
                   th:src="${item.imageUrl}"
                   th:alt="${item.title}"
                   loading="lazy"/>
              <img th:unless="${item.imageUrl != null and !item.imageUrl.isEmpty()}"
                   src="https://placehold.co/600x400/1f2937/d8b15b?text=Gallery"
                   th:alt="${item.title}"
                   loading="lazy"/>

              <!-- Hover overlay -->
              <div class="gallery-overlay">
                <span class="item-title" th:text="${item.title}">Project Title</span>
                <span class="item-category"
                      th:if="${item.category != null and !item.category.isEmpty()}"
                      th:text="${item.category}">Category</span>
              </div>

              <!-- Zoom icon -->
              <div class="gallery-zoom-btn" title="View full size">
                <i class="fa-solid fa-magnifying-glass-plus"></i>
              </div>
            </a>
          </div>
        </div>

        <!-- Pagination -->
        <nav th:if="${items.totalPages > 1}" class="mt-5" aria-label="Gallery pages">
          <ul class="pagination justify-content-center gap-1">

            <!-- Previous -->
            <li class="page-item" th:classappend="${!items.hasPrevious} ? 'disabled'">
              <a class="page-link"
                 th:href="@{/gallery(page=${items.number - 1}, category=${currentCategory})}"
                 aria-label="Previous">
                <i class="fa-solid fa-chevron-left small"></i>
              </a>
            </li>

            <!-- Page numbers -->
            <li class="page-item"
                th:each="i : ${#numbers.sequence(0, items.totalPages - 1)}"
                th:classappend="${i == items.number} ? 'active'">
              <a class="page-link"
                 th:href="@{/gallery(page=${i}, category=${currentCategory})}"
                 th:text="${i + 1}">1</a>
            </li>

            <!-- Next -->
            <li class="page-item" th:classappend="${!items.hasNext} ? 'disabled'">
              <a class="page-link"
                 th:href="@{/gallery(page=${items.number + 1}, category=${currentCategory})}"
                 aria-label="Next">
                <i class="fa-solid fa-chevron-right small"></i>
              </a>
            </li>

          </ul>

          <!-- Page count text -->
          <p class="text-center text-muted small mt-2">
            Page <span th:text="${items.number + 1}">1</span>
            of <span th:text="${items.totalPages}">1</span>
            &nbsp;&middot;&nbsp;
            <span th:text="${items.totalElements}">0</span> items total
          </p>
        </nav>

      </div><!-- /items exist -->

      <!-- Empty state -->
      <div th:if="${items == null or items.empty}" class="text-center py-5">
        <i class="fa-regular fa-image fa-3x mb-3" style="color: #dee2e6;"></i>
        <h5 class="text-muted">No gallery items found</h5>
        <p class="text-muted small mb-4"
           th:if="${currentCategory != null and currentCategory != ''}">
          There are no items in the &ldquo;<span th:text="${currentCategory}">Category</span>&rdquo; category yet.
        </p>
        <a th:href="@{/gallery}"
           th:if="${currentCategory != null and currentCategory != ''}"
           class="btn btn-sm fw-semibold"
           style="background-color: var(--orange); color: #fff;">
          <i class="fa-solid fa-th me-1"></i>View All
        </a>
      </div>

    </div>
  </section>

  <!-- ==================== LIGHTBOX MODAL ==================== -->
  <div class="modal fade" id="lightboxModal" tabindex="-1" aria-label="Gallery image viewer" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered modal-xl">
      <div class="modal-content position-relative">
        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
        <div class="modal-body">
          <img id="lightboxImg" src="" alt="Gallery image" class="img-fluid"/>
          <p id="lightboxTitle" class="text-white text-center small mt-2 mb-0 px-3"></p>
        </div>
      </div>
    </div>
  </div>

  <!-- Footer fragment -->
  <div th:replace="~{fragments/footer :: footer}"></div>

  <!-- Bootstrap 5.3 JS bundle -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
          integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
          crossorigin="anonymous"></script>

  <script>
    // Populate lightbox modal on show
    var lightboxModal = document.getElementById('lightboxModal');
    if (lightboxModal) {
      lightboxModal.addEventListener('show.bs.modal', function (event) {
        var trigger = event.relatedTarget;
        if (!trigger) return;
        var imgSrc   = trigger.getAttribute('data-img')   || trigger.href;
        var imgTitle = trigger.getAttribute('data-title') || '';
        document.getElementById('lightboxImg').src        = imgSrc;
        document.getElementById('lightboxTitle').textContent = imgTitle;
      });
      lightboxModal.addEventListener('hidden.bs.modal', function () {
        document.getElementById('lightboxImg').src = '';
      });
    }
  </script>
  <script src="/js/main.js"></script>
</body>
</html>
