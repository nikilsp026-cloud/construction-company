<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title th:text="${settings != null and settings['site_name'] != null} ? ${settings['site_name']} + ' — Gallery' : 'BuildMaster — Gallery'">BuildMaster — Gallery</title>

  <!-- Bootstrap 5.3 -->
  <link rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
        crossorigin="anonymous"/>
  <!-- Font Awesome 6 -->
  <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"
        integrity="sha512-SnH5WK+bZxgPHs44uWIX+LLJAJ9/2PkPKZ5QiAj6Ta86w+fsb2TkcmfRyVX3pBnMFcV7oQPJkl9QevSCWr3W=="
        crossorigin="anonymous"
        referrerpolicy="no-referrer"/>

  <style>
    :root {
      --navy:  #1a2332;
      --orange: #f7941d;
    }

    body {
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      color: #333;
    }

    /* ---- Page hero ---- */
    .page-hero {
      background: linear-gradient(rgba(26, 35, 50, 0.80), rgba(26, 35, 50, 0.80)),
                  url('/images/gallery-hero.jpg') center / cover no-repeat;
      padding: 100px 0 65px;
      color: #fff;
    }
    .page-hero h1 {
      font-size: 2.8rem;
      font-weight: 800;
    }
    .page-hero .breadcrumb-item + .breadcrumb-item::before {
      color: rgba(255, 255, 255, 0.45);
    }
    .page-hero .breadcrumb-item a {
      color: var(--orange);
      text-decoration: none;
    }
    .page-hero .breadcrumb-item.active {
      color: rgba(255, 255, 255, 0.75);
    }

    /* ---- Section label / divider ---- */
    .section-label {
      font-size: .8rem;
      font-weight: 700;
      letter-spacing: .1em;
      color: var(--orange);
      text-transform: uppercase;
    }
    .section-divider {
      width: 52px;
      height: 4px;
      background: var(--orange);
      border-radius: 2px;
      margin: .6rem auto 1.5rem;
    }

    /* ---- Category filter tabs ---- */
    .filter-tabs .nav-link {
      border-radius: 30px;
      padding: 6px 22px;
      font-weight: 500;
      font-size: .9rem;
      color: var(--navy);
      background: transparent;
      border: 1.5px solid #dee2e6;
      transition: all .22s ease;
    }
    .filter-tabs .nav-link:hover {
      border-color: var(--orange);
      color: var(--orange);
    }
    .filter-tabs .nav-link.active-filter {
      background: var(--orange);
      border-color: var(--orange);
      color: #fff;
    }

    /* ---- Gallery grid items ---- */
    .gallery-item {
      position: relative;
      overflow: hidden;
      border-radius: 10px;
      display: block;
      text-decoration: none;
    }
    .gallery-item img {
      width: 100%;
      height: 255px;
      object-fit: cover;
      display: block;
      transition: transform .42s ease;
    }
    .gallery-item:hover img {
      transform: scale(1.07);
    }
    .gallery-overlay {
      position: absolute;
      inset: 0;
      background: linear-gradient(to top, rgba(26, 35, 50, 0.82) 0%, rgba(26, 35, 50, 0.10) 60%);
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      justify-content: flex-end;
      padding: 18px 16px;
      opacity: 0;
      transition: opacity .32s ease;
    }
    .gallery-item:hover .gallery-overlay {
      opacity: 1;
    }
    .gallery-overlay .item-title {
      color: #fff;
      font-weight: 700;
      font-size: .95rem;
      border-left: 3px solid var(--orange);
      padding-left: 10px;
      line-height: 1.3;
    }
    .gallery-overlay .item-category {
      font-size: .75rem;
      color: var(--orange);
      font-weight: 600;
      padding-left: 13px;
      margin-top: 4px;
    }
    .gallery-zoom-btn {
      position: absolute;
      top: 12px;
      right: 12px;
      width: 36px;
      height: 36px;
      border-radius: 50%;
      background: var(--orange);
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: .85rem;
      opacity: 0;
      transition: opacity .28s ease, transform .28s ease;
      transform: scale(0.8);
    }
    .gallery-item:hover .gallery-zoom-btn {
      opacity: 1;
      transform: scale(1);
    }

    /* ---- Lightbox modal ---- */
    #lightboxModal .modal-content {
      background: #000;
      border: none;
    }
    #lightboxModal .modal-body {
      padding: 0;
      text-align: center;
    }
    #lightboxModal img {
      max-height: 82vh;
      max-width: 100%;
      object-fit: contain;
    }
    #lightboxModal .btn-close {
      filter: invert(1);
      position: absolute;
      top: 10px;
      right: 14px;
      z-index: 10;
    }

    /* ---- Pagination ---- */
    .page-link {
      color: var(--navy);
      border-radius: 6px !important;
      margin: 0 2px;
    }
    .page-link:hover {
      color: var(--orange);
      border-color: var(--orange);
    }
    .page-item.active .page-link {
      background-color: var(--orange);
      border-color: var(--orange);
      color: #fff;
    }
    .page-item.disabled .page-link {
      color: #adb5bd;
    }
  </style>
</head>

<body class="d-flex flex-column min-vh-100">

  <!-- Navbar fragment -->
  <div th:replace="~{fragments/navbar :: navbar}"></div>

  <!-- ==================== PAGE HERO ==================== -->
  <section class="page-hero text-center">
    <div class="container">
      <p class="section-label">
        <i class="fa-solid fa-images me-1"></i>Our Work in Photos
      </p>
      <h1 class="mb-3">Our Gallery</h1>
      <p class="mb-4 fs-5" style="color: rgba(255,255,255,.70);"
         th:text="${settings != null and settings['site_tagline'] != null} ? ${settings['site_tagline']} : 'A visual journey through our finest projects.'">
        A visual journey through our finest projects.
      </p>
      <nav aria-label="breadcrumb">
        <ol class="breadcrumb justify-content-center mb-0">
          <li class="breadcrumb-item"><a href="/">Home</a></li>
          <li class="breadcrumb-item active" aria-current="page">Gallery</li>
        </ol>
      </nav>
    </div>
  </section>

  <!-- ==================== GALLERY SECTION ==================== -->
  <section class="py-5" style="padding-top: 4rem !important; padding-bottom: 5rem !important;">
    <div class="container">

      <!-- Section intro -->
      <div class="text-center mb-5">
        <p class="section-label">Browse by Category</p>
        <div class="section-divider"></div>
      </div>

      <!-- Category filter tabs -->
      <div class="d-flex justify-content-center mb-5">
        <ul class="nav gap-2 flex-wrap filter-tabs justify-content-center">

          <!-- "All" tab -->
          <li class="nav-item">
            <a class="nav-link"
               th:classappend="${currentCategory == null or currentCategory == ''} ? 'active-filter' : ''"
               th:href="@{/gallery}">
              <i class="fa-solid fa-th me-1"></i>All
            </a>
          </li>

          <!-- Category tabs from model -->
          <li class="nav-item" th:each="cat : ${categories}">
            <a class="nav-link"
               th:classappend="${currentCategory != null and currentCategory == cat} ? 'active-filter' : ''"
               th:href="@{/gallery(category=${cat})}"
               th:text="${cat}">Category</a>
          </li>

        </ul>
      </div>

      <!-- Gallery grid -->
      <div th:if="${items != null and !items.empty}">
        <div class="row g-4">
          <div class="col-12 col-sm-6 col-lg-4" th:each="item : ${items.content}">
            <a class="gallery-item shadow-sm"
               th:href="${item.imageUrl}"
               th:data-bs-toggle="${item.imageUrl != null} ? 'modal' : ''"
               th:data-bs-target="${item.imageUrl != null} ? '#lightboxModal' : ''"
               th:data-img="${item.imageUrl}"
               th:data-title="${item.title}"
               href="#"
               data-bs-toggle="modal"
               data-bs-target="#lightboxModal">

              <!-- Image -->
              <img th:if="${item.imageUrl != null and !item.imageUrl.isEmpty()}"
                   th:src="${item.imageUrl}"
                   th:alt="${item.title}"
                   loading="lazy"/>
              <img th:unless="${item.imageUrl != null and !item.imageUrl.isEmpty()}"
                   src="https://placehold.co/600x400/1a2332/f7941d?text=Gallery"
                   th:alt="${item.title}"
                   loading="lazy"/>

              <!-- Hover overlay -->
              <div class="gallery-overlay">
                <span class="item-title" th:text="${item.title}">Project Title</span>
                <span class="item-category"
                      th:if="${item.category != null and !item.category.isEmpty()}"
                      th:text="${item.category}">Category</span>
              </div>

              <!-- Zoom icon -->
              <div class="gallery-zoom-btn" title="View full size">
                <i class="fa-solid fa-magnifying-glass-plus"></i>
              </div>
            </a>
          </div>
        </div>

        <!-- Pagination -->
        <nav th:if="${items.totalPages > 1}" class="mt-5" aria-label="Gallery pages">
          <ul class="pagination justify-content-center gap-1">

            <!-- Previous -->
            <li class="page-item" th:classappend="${!items.hasPrevious} ? 'disabled'">
              <a class="page-link"
                 th:href="@{/gallery(page=${items.number - 1}, category=${currentCategory})}"
                 aria-label="Previous">
                <i class="fa-solid fa-chevron-left small"></i>
              </a>
            </li>

            <!-- Page numbers -->
            <li class="page-item"
                th:each="i : ${#numbers.sequence(0, items.totalPages - 1)}"
                th:classappend="${i == items.number} ? 'active'">
              <a class="page-link"
                 th:href="@{/gallery(page=${i}, category=${currentCategory})}"
                 th:text="${i + 1}">1</a>
            </li>

            <!-- Next -->
            <li class="page-item" th:classappend="${!items.hasNext} ? 'disabled'">
              <a class="page-link"
                 th:href="@{/gallery(page=${items.number + 1}, category=${currentCategory})}"
                 aria-label="Next">
                <i class="fa-solid fa-chevron-right small"></i>
              </a>
            </li>

          </ul>

          <!-- Page count text -->
          <p class="text-center text-muted small mt-2">
            Page <span th:text="${items.number + 1}">1</span>
            of <span th:text="${items.totalPages}">1</span>
            &nbsp;&middot;&nbsp;
            <span th:text="${items.totalElements}">0</span> items total
          </p>
        </nav>

      </div><!-- /items exist -->

      <!-- Empty state -->
      <div th:if="${items == null or items.empty}" class="text-center py-5">
        <i class="fa-regular fa-image fa-3x mb-3" style="color: #dee2e6;"></i>
        <h5 class="text-muted">No gallery items found</h5>
        <p class="text-muted small mb-4"
           th:if="${currentCategory != null and currentCategory != ''}">
          There are no items in the &ldquo;<span th:text="${currentCategory}">Category</span>&rdquo; category yet.
        </p>
        <a th:href="@{/gallery}"
           th:if="${currentCategory != null and currentCategory != ''}"
           class="btn btn-sm fw-semibold"
           style="background-color: var(--orange); color: #fff;">
          <i class="fa-solid fa-th me-1"></i>View All
        </a>
      </div>

    </div>
  </section>

  <!-- ==================== LIGHTBOX MODAL ==================== -->
  <div class="modal fade" id="lightboxModal" tabindex="-1" aria-label="Gallery image viewer" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered modal-xl">
      <div class="modal-content position-relative">
        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
        <div class="modal-body">
          <img id="lightboxImg" src="" alt="Gallery image" class="img-fluid"/>
          <p id="lightboxTitle" class="text-white text-center small mt-2 mb-0 px-3"></p>
        </div>
      </div>
    </div>
  </div>

  <!-- Footer fragment -->
  <div th:replace="~{fragments/footer :: footer}"></div>

  <!-- Bootstrap 5.3 JS bundle -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
          integrity="sha384-YvpcrYf0tY3lHB60NNkmXc4s9bIOgUxi8T/jzmMIcWVlvIEbKE5p14rrNVVhFKr1"
          crossorigin="anonymous"></script>

  <script>
    // Populate lightbox modal on show
    var lightboxModal = document.getElementById('lightboxModal');
    if (lightboxModal) {
      lightboxModal.addEventListener('show.bs.modal', function (event) {
        var trigger = event.relatedTarget;
        if (!trigger) return;
        var imgSrc   = trigger.getAttribute('data-img')   || trigger.href;
        var imgTitle = trigger.getAttribute('data-title') || '';
        document.getElementById('lightboxImg').src        = imgSrc;
        document.getElementById('lightboxTitle').textContent = imgTitle;
      });
      lightboxModal.addEventListener('hidden.bs.modal', function () {
        document.getElementById('lightboxImg').src = '';
      });
    }
  </script>
</body>
</html>
