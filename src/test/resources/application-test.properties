# Test-only config: in-memory H2, never the real Neon database.
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=create-drop

# Dummy R2 values so FileStorageService's client can be constructed (no
# network calls happen just from building the client).
app.r2.account-id=test-account
app.r2.access-key=test-access-key
app.r2.secret-key=test-secret-key
app.r2.bucket=test-bucket
app.r2.public-url=https://test.example.com

# Don't seed demo projects/services/testimonials/team for context-load tests.
app.data.seed-demo-content=false
